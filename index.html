<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex">
<title>The Terpene Sommelier · Scan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  :root{
    --green:#31AA64;
    --ink:#1D2024;
    --ink-dim:#6B7078;
    --line:#E3E5E8;
    --field:#F5F6F7;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent}
  body{
    color:var(--ink);
    font-family:'DM Sans',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:480px;margin:0 auto;padding:8px 12px 24px}

  /* ---------- scanner ---------- */
  .scan-frame{position:relative;border-radius:var(--radius);overflow:hidden;background:#000}
  #video{
    width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#000;
  }
  .scan-frame::after{
    content:"";position:absolute;inset:12%;
    border:2px solid rgba(49,170,100,.9);border-radius:12px;
    pointer-events:none;
  }
  /* zoom overlay */
  .zoom-wrap{
    position:absolute;left:12px;right:12px;bottom:10px;
    display:flex;align-items:center;gap:10px;
    background:rgba(0,0,0,.5);border-radius:999px;padding:0 14px;height:40px;
    backdrop-filter:blur(4px);
  }
  .zoom-wrap.hide{display:none}
  .zoom-wrap span{color:#fff;font-size:.72rem;flex:0 0 auto;opacity:.9}
  .zoom-wrap input[type=range]{flex:1;accent-color:var(--green);height:4px}

  .btn{
    display:block;width:100%;border:none;cursor:pointer;
    background:var(--green);color:#fff;font-family:'DM Sans',sans-serif;
    font-weight:700;font-size:1rem;padding:14px 20px;border-radius:12px;
    margin-top:12px;
  }
  .btn:focus-visible{outline:2px solid var(--green);outline-offset:3px}

  #scanHint{color:var(--ink-dim);font-size:.85rem;text-align:center;margin-top:10px;line-height:1.5}
  .status{margin-top:10px;text-align:center;font-size:.85rem;min-height:1.2em;color:var(--ink-dim)}
  .status.err{color:#C0392B}

  /* ---------- manual entry ---------- */
  .manual{
    margin-top:20px;padding-top:18px;border-top:1px solid var(--line);
  }
  .manual h3{
    font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.14em;color:var(--ink-dim);
    margin-bottom:4px;
  }
  .manual .sub{font-size:.8rem;color:var(--ink-dim);margin-bottom:14px;line-height:1.5}
  .field{margin-bottom:12px}
  .field label{
    display:block;font-size:.72rem;font-weight:700;color:var(--ink);
    margin-bottom:5px;
  }
  .field label em{
    display:block;font-style:normal;font-weight:400;font-size:.7rem;
    color:var(--ink-dim);margin-top:2px;
  }
  .field input{
    width:100%;background:var(--field);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);font-family:'DM Sans',sans-serif;font-size:1rem;
    padding:12px 14px;letter-spacing:.03em;
  }
  .field input:focus{outline:2px solid var(--green);outline-offset:1px;background:#fff}
  .field .ai{
    display:inline-block;background:var(--green);color:#fff;
    font-size:.62rem;font-weight:700;border-radius:4px;
    padding:2px 6px;margin-right:6px;vertical-align:middle;
  }

  /* ---------- result card ---------- */
  .card{
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);
    padding:20px 18px;margin-top:18px;
    box-shadow:0 4px 16px rgba(0,0,0,.06);
  }
  .card .cat{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--green);font-weight:700}
  .card h2{font-family:'Playfair Display',serif;font-size:1.4rem;line-height:1.15;margin:6px 0 2px}
  .card .brandline{color:var(--ink-dim);font-size:.85rem;margin-bottom:14px}
  .pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .pill{
    background:var(--field);border:1px solid var(--line);border-radius:999px;
    padding:6px 13px;font-size:.78rem;font-weight:700;
  }
  .pill b{color:var(--green)}
  .terps{border-top:1px solid var(--line);padding-top:14px}
  .terps h3{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:10px}
  .terp{display:flex;padding:7px 0;font-size:.95rem}
  .terp .rank{color:var(--green);font-weight:700;margin-right:10px}
  .meta{
    display:flex;justify-content:space-between;color:var(--ink-dim);
    font-size:.72rem;margin-top:16px;border-top:1px solid var(--line);padding-top:12px;
  }
  .demo-tag{
    background:#FFF4D6;color:#8A6D1F;border-radius:6px;
    font-size:.65rem;font-weight:700;padding:3px 8px;letter-spacing:.06em;
    display:inline-block;margin-bottom:10px;
  }
  .notfound{
    background:#fff;border:1px dashed var(--line);border-radius:var(--radius);
    padding:22px 18px;margin-top:18px;text-align:center;color:var(--ink-dim);
    font-size:.9rem;line-height:1.6;
  }
  .notfound b{color:var(--ink)}

  .hide{display:none!important}
</style>
</head>
<body>

<div class="wrap">

  <!-- ============ SCANNER ============ -->
  <div class="scan-frame">
    <video id="video" playsinline muted></video>
    <div class="zoom-wrap hide" id="zoomWrap">
      <span>Zoom</span>
      <input type="range" id="zoomRange" min="1" max="1" step="0.1" value="1" aria-label="Zoom">
    </div>
  </div>

  <button class="btn" id="startBtn">Start scanning</button>
  <p id="scanHint">Point your camera at the barcode on the package label.</p>
  <p class="status" id="status"></p>

  <div id="cardHolder"></div>

  <!-- ============ MANUAL ENTRY ============ -->
  <div class="manual">
    <h3>Enter manually</h3>
    <p class="sub">Can't scan the label? Type the values printed underneath the barcode.</p>

    <div class="field">
      <label><span class="ai">01</span>Product code (SKU / GTIN)
        <em>Required — usually 12–14 digits</em>
      </label>
      <input id="inGtin" type="text" inputmode="numeric" placeholder="e.g. 800129905886" autocomplete="off">
    </div>

    <div class="field">
      <label><span class="ai">10</span>Lot number
        <em>Optional</em>
      </label>
      <input id="inLot" type="text" placeholder="e.g. GG1H0511" autocomplete="off">
    </div>

    <div class="field">
      <label><span class="ai">13</span>Packaged date
        <em>Optional — YYYY-MM-DD</em>
      </label>
      <input id="inPack" type="text" inputmode="numeric" placeholder="e.g. 2026-05-22" autocomplete="off">
    </div>

    <button class="btn" id="manualGo">Find product</button>
  </div>

</div>

<script>
/* =====================================================================
   CONFIG
   API_BASE  – product lookup service (leave "" for demo mode)
   WRITE_URL – Google Apps Script endpoint that logs scans to the Sheet
               (leave "" until you deploy it; scans just won't be logged)
===================================================================== */
const API_BASE  = "";
const WRITE_URL = "https://script.google.com/macros/s/AKfycbwDB49IjpEutdT-XH8bXX-Y2Eq6uBRqxN4Dl1Trcmg6otbfv9pPkm8ZnEBHDjxzXSt4/exec";

/* The signed-in Glide user's email arrives as ?user=... on the embed URL */
const USER_EMAIL = new URLSearchParams(location.search).get("user") || "";

const DEMO_PRODUCTS = {
  "800129905886": {
    name: "Demo Product — Greentone",
    brand: "Greentone Enterprises",
    category: "Dried Flower",
    thc: "THC 20–26%",
    cbd: "CBD <1%",
    terpenes: ["Beta-Myrcene", "Beta-Caryophyllene", "Limonene"],
    leaning: "Indica leaning"
  }
};

/* ============ GS1 PARSING ============ */
function parseScan(raw) {
  const out = { gtin: null, lot: null, packaged: null };
  let s = String(raw).replace(/[()]/g, "");
  if (/^\d{8,14}$/.test(s)) { out.gtin = s.replace(/^0+/, ""); return out; }
  const gs = "\u001d";
  let i = 0;
  while (i < s.length - 1) {
    const ai = s.slice(i, i + 2);
    if (ai === "01") { out.gtin = s.slice(i + 2, i + 16).replace(/^0+/, ""); i += 16; }
    else if (ai === "13" || ai === "11" || ai === "15" || ai === "17") {
      const val = s.slice(i + 2, i + 8);
      if (ai === "13") out.packaged = "20" + val.slice(0,2) + "-" + val.slice(2,4) + "-" + val.slice(4,6);
      i += 8;
    }
    else if (ai === "10" || ai === "21") {
      let end = s.indexOf(gs, i + 2);
      if (end === -1) end = s.length;
      if (ai === "10") out.lot = s.slice(i + 2, end);
      i = end + 1;
    }
    else { i += 1; }
  }
  return out;
}

/* ============ PRODUCT LOOKUP ============ */
async function lookup(gtin) {
  if (!API_BASE) {
    return DEMO_PRODUCTS[gtin] ? { demo: true, ...DEMO_PRODUCTS[gtin] } : null;
  }
  try {
    const r = await fetch(API_BASE + "/card?code=" + encodeURIComponent(gtin));
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

/* ============ LOG THE SCAN (to Google Sheet via Apps Script) ============ */
async function logScan(scan) {
  if (!WRITE_URL) return;                 // not configured yet — skip quietly
  try {
    await fetch(WRITE_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        user: USER_EMAIL,
        gtin: scan.gtin || "",
        lot: scan.lot || "",
        packaged: scan.packaged || "",
        at: new Date().toISOString()
      })
    });
  } catch (e) { /* logging must never block the card */ }
}

/* ============ CARD RENDER ============ */
const cardHolder = document.getElementById("cardHolder");
function renderCard(p, scan) {
  if (!p) {
    cardHolder.innerHTML =
      "<div class='notfound'>We couldn't find that product.<br>" +
      "Code: <b>" + (scan.gtin || "—") + "</b><br>" +
      "Try re-scanning, or check the code you typed.</div>";
    return;
  }
  const terps = (p.terpenes || []).map((t, i) =>
    "<div class='terp'><span class='rank'>" + (i + 1) + "</span>" + t + "</div>").join("");
  cardHolder.innerHTML =
    "<div class='card'>" +
      (p.demo ? "<span class='demo-tag'>DEMO DATA</span>" : "") +
      "<div class='cat'>" + (p.category || "") + (p.leaning ? " · " + p.leaning : "") + "</div>" +
      "<h2>" + p.name + "</h2>" +
      "<div class='brandline'>" + (p.brand || "") + "</div>" +
      "<div class='pills'>" +
        (p.thc ? "<span class='pill'><b>" + p.thc + "</b></span>" : "") +
        (p.cbd ? "<span class='pill'>" + p.cbd + "</span>" : "") +
      "</div>" +
      "<div class='terps'><h3>Terpene Profile</h3>" + terps + "</div>" +
      "<div class='meta'>" +
        "<span>" + (scan.packaged ? "Packaged " + scan.packaged : "") + "</span>" +
        "<span>" + (scan.lot ? "Lot " + scan.lot : "") + "</span>" +
      "</div>" +
    "</div>";
}

/* ============ SHARED HANDLER ============ */
const statusEl = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
function setStatus(msg, err) {
  statusEl.textContent = msg;
  statusEl.classList.toggle("err", !!err);
}
async function handleScan(scan) {
  if (!scan.gtin) { setStatus("No product code found. Try again or enter it manually.", true); return; }
  setStatus("Looking up " + scan.gtin + "…");
  const p = await lookup(scan.gtin);
  renderCard(p, scan);
  logScan(scan);
  setStatus("", false);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

/* ============ SCANNER ============ */
const video = document.getElementById("video");
const zoomWrap = document.getElementById("zoomWrap");
const zoomRange = document.getElementById("zoomRange");
let running = false, currentTrack = null, zxingReader = null, nativeTimer = null;

function stopStreams() {
  if (nativeTimer) { clearInterval(nativeTimer); nativeTimer = null; }
  if (zxingReader) { try { zxingReader.reset(); } catch {} }
  const s = video.srcObject;
  if (s) { s.getTracks().forEach(t => t.stop()); video.srcObject = null; }
  currentTrack = null;
  zoomWrap.classList.add("hide");
}

function wireZoom(stream) {
  currentTrack = stream.getVideoTracks()[0];
  if (!currentTrack || !currentTrack.getCapabilities) return;
  const caps = currentTrack.getCapabilities();
  if (caps.zoom && caps.zoom.max > caps.zoom.min) {
    zoomWrap.classList.remove("hide");
    zoomRange.min = caps.zoom.min;
    zoomRange.max = caps.zoom.max;
    zoomRange.step = caps.zoom.step || 0.1;
    zoomRange.value = currentTrack.getSettings().zoom || caps.zoom.min;
    zoomRange.oninput = () => {
      try { currentTrack.applyConstraints({ advanced: [{ zoom: parseFloat(zoomRange.value) }] }); } catch {}
    };
  }
}

async function onScan(rawText) {
  if (!running) return;
  running = false;
  stopStreams();
  await handleScan(parseScan(rawText));
  startBtn.textContent = "Scan another";
  startBtn.classList.remove("hide");
}

const camConstraints = { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } };

async function startNative() {
  const supported = await window.BarcodeDetector.getSupportedFormats();
  if (!supported.includes("data_matrix")) return false;
  const detector = new BarcodeDetector({ formats: ["data_matrix", "upc_a", "ean_13", "code_128"] });
  const stream = await navigator.mediaDevices.getUserMedia({ video: camConstraints });
  video.srcObject = stream; await video.play();
  wireZoom(stream);
  nativeTimer = setInterval(async () => {
    if (!running) return;
    try {
      const codes = await detector.detect(video);
      if (codes.length) onScan(codes[0].rawValue);
    } catch {}
  }, 250);
  return true;
}

async function startZXing() {
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.DATA_MATRIX,
    ZXing.BarcodeFormat.UPC_A,
    ZXing.BarcodeFormat.EAN_13,
    ZXing.BarcodeFormat.CODE_128
  ]);
  zxingReader = new ZXing.BrowserMultiFormatReader(hints);
  const stream = await navigator.mediaDevices.getUserMedia({ video: camConstraints });
  video.srcObject = stream; await video.play();
  wireZoom(stream);
  zxingReader.decodeFromVideoElement(video, (result) => {
    if (result && running) onScan(result.getText());
  });
}

startBtn.onclick = async () => {
  startBtn.classList.add("hide");
  cardHolder.innerHTML = "";
  setStatus("Starting camera…");
  running = true;
  try {
    let ok = false;
    if ("BarcodeDetector" in window) { try { ok = await startNative(); } catch { ok = false; } }
    if (!ok) await startZXing();
    setStatus("Scanning — hold the code inside the frame. Use zoom for small labels.");
  } catch (e) {
    running = false;
    setStatus("Camera unavailable (" + (e && e.name ? e.name : "error") + "). Check permissions, or enter the code below.", true);
    startBtn.classList.remove("hide");
  }
};

/* ============ MANUAL ENTRY ============ */
document.getElementById("manualGo").onclick = async () => {
  const gtin = (document.getElementById("inGtin").value || "").replace(/\D/g, "").replace(/^0+/, "");
  const lot  = (document.getElementById("inLot").value  || "").trim();
  const pack = (document.getElementById("inPack").value || "").trim();
  if (gtin.length < 8) { setStatus("Enter at least 8 digits for the product code.", true); return; }
  running = false;
  stopStreams();
  startBtn.textContent = "Start scanning";
  startBtn.classList.remove("hide");
  await handleScan({ gtin: gtin, lot: lot || null, packaged: pack || null });
};
["inGtin","inLot","inPack"].forEach(id => {
  document.getElementById(id).addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("manualGo").click();
  });
});
</script>
</body>
</html>
