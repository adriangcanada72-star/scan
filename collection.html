<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>My Collection · The Terpene Sommelier</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent}
  body{font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#1B2430}
  .wrap{max-width:1100px;margin:0 auto;padding:10px 12px 30px}

  .bar{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:2px 2px 12px;
  }
  .bar .count{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:.64rem;
    letter-spacing:.16em;text-transform:uppercase;color:#8B959F;
  }
  .bar .hint{font-size:.66rem;color:#9AA3AC}

  .msg{
    text-align:center;color:#8B959F;font-size:.9rem;line-height:1.8;
    padding:50px 20px;
  }
  .msg b{color:#1B2430;display:block;margin-bottom:6px;font-size:1rem}

  .grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);   /* phone: 2 across */
    gap:9px;
  }
  @media(min-width:480px){.grid{grid-template-columns:repeat(4,1fr);gap:12px}}
  @media(min-width:680px){.grid{grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:18px}}

  /* ══ CARD SHELL ══ */
  .scene{width:100%;aspect-ratio:5/7;perspective:1500px}
  .card{
    position:relative;width:100%;height:100%;transform-style:preserve-3d;
    transition:transform .75s cubic-bezier(.2,.75,.2,1);cursor:pointer;
  }
  .card.flipped{transform:rotateY(180deg)}
  /* grid cards are thumbnails — they lift and brighten on hover/press to
     read as "tap to open", and never flip in place */
  .grid .scene .card{transition:transform .24s cubic-bezier(.2,.8,.2,1)}
  .grid .scene .face{transition:box-shadow .24s ease}
  .grid .scene:hover .card,
  .grid .scene:active .card{transform:translateY(-4px) scale(1.02)}
  .grid .scene:hover .face{box-shadow:0 20px 40px -12px rgba(0,0,0,.42)}
  .grid .scene .card .back{visibility:hidden}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;
    border-radius:9px;box-shadow:0 14px 34px -10px rgba(0,0,0,.32);
  }
  .back{transform:rotateY(180deg)}
  /* only the visible face may take clicks, or taps on back-face inputs
     fall through to the invisible front and trigger a flip */
  .front{pointer-events:auto}
  .back{pointer-events:none}
  .card.flipped .front{pointer-events:none}
  .card.flipped .back{pointer-events:auto}
  .card:focus-visible{outline:3px solid var(--deep);outline-offset:5px;border-radius:12px}

  /* ══ FRONT ══ */
  .front{background:var(--border);padding:5px;display:flex}
  @media(min-width:680px){.front{padding:8px}}
  .stage{
    flex:1;position:relative;overflow:hidden;border-radius:2px;
    background:#fff;display:flex;flex-direction:column;
  }
  .hero{
    flex:1;position:relative;overflow:hidden;background:#fff;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    min-height:0;
  }
  /* the producer's logo IS the portrait — no frame, no watermark,
     just the mark as big as the space allows */
  .hero .mark{
    position:relative;z-index:3;text-align:center;
    padding:10px 5px 2px;width:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    flex:1;min-height:0;
  }
  .hero .mark img{
    width:100%;height:100%;object-fit:contain;display:block;
  }
  /* the hero takes most of the card now; give the logo generous room */
  .hero{padding-bottom:2px}
  .hero .mark .wm{
    font-family:'Playfair Display',serif;font-weight:800;font-size:1.7rem;
    line-height:1.08;color:#22303C;padding:0 4px;
  }
  .hero .mark .sz{
    display:none;   /* hidden at thumbnail size */
    font-family:'Oswald',sans-serif;font-weight:500;font-size:.42rem;
    letter-spacing:.2em;text-transform:uppercase;color:#8B959F;
    margin-top:4px;flex:0 0 auto;
  }
  @media(min-width:680px){.hero .mark .sz{display:block}}

  /* the tasting note — a line of character above the numbers */
  .blurb{
    padding:0 6px;margin-top:4px;
    font-family:'DM Sans',sans-serif;font-size:.38rem;line-height:1.4;
    color:#5C6771;text-align:center;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  @media(min-width:680px){.blurb{font-size:.5rem;padding:0 9px;margin-top:5px;-webkit-line-clamp:2}}
  .cardno{
    position:absolute;top:5px;right:6px;z-index:4;
    font-family:'Oswald',sans-serif;font-weight:700;font-size:.32rem;
    color:var(--deep);letter-spacing:.03em;white-space:nowrap;
  }
  @media(min-width:680px){.cardno{font-size:.42rem;top:7px;right:8px}}
  .canna{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .stage .canna{padding:0 8px;margin:5px 0 6px}
  .canna .b{
    border-radius:3px;padding:6px 5px;text-align:center;
    border:2px solid #fff;box-shadow:0 1px 4px rgba(27,36,48,.16);
  }
  .canna .thc{background:var(--c-thc)}
  .canna .cbd{background:var(--c-cbd)}
  .canna .b .k{
    font-family:'Oswald',sans-serif;font-weight:700;font-size:.36rem;
    letter-spacing:.1em;text-transform:uppercase;color:#1B2430;opacity:.75;
  }
  .canna .b .v{font-family:'Anton',sans-serif;font-size:.56rem;margin-top:1px;color:#1B2430}
  @media(min-width:680px){
    .canna .b .k{font-size:.46rem;letter-spacing:.13em}
    .canna .b .v{font-size:.78rem}
  }
  .plate{
    position:relative;background:#fff;padding:6px 6px 7px;
    display:flex;align-items:center;gap:5px;overflow:hidden;
    border-top:2px solid var(--border);
  }
  @media(min-width:680px){.plate{padding:10px 10px 11px;gap:9px;border-top-width:3px}}
  .plate .burst{
    position:absolute;left:34%;top:50%;transform:translate(-50%,-50%);
    width:230%;aspect-ratio:1;
    background:repeating-conic-gradient(from 0deg at 50% 50%,
      rgba(35,50,64,.055) 0deg 4deg, transparent 4deg 10deg);
  }
  .plate .crest{
    position:relative;z-index:2;flex:0 0 auto;
    width:28px;height:28px;border-radius:50%;
    background:#fff;border:2px solid var(--border);
    box-shadow:0 2px 6px rgba(0,0,0,.15);
    display:flex;align-items:center;justify-content:center;overflow:hidden;padding:2px;
  }
  @media(min-width:680px){.plate .crest{width:46px;height:46px;border-width:3px;padding:4px}}
  .plate .crest img{width:100%;height:100%;object-fit:contain}
  .plate .crest .ini{font-family:'Anton',sans-serif;font-size:.56rem;color:var(--deep);line-height:1}
  @media(min-width:680px){.plate .crest .ini{font-size:.9rem}}
  .plate .txt{position:relative;z-index:2;min-width:0}
  .plate .txt .nm{
    font-family:'Anton',sans-serif;font-size:.58rem;color:#1B2430;
    line-height:1.02;text-transform:uppercase;
  }
  @media(min-width:680px){.plate .txt .nm{font-size:.76rem}}
  /* info strip under the logo, above the nameplate line */
  .heroinfo{
    padding:0 8px 5px;text-align:center;
  }
  .heroinfo .finfo{
    display:flex;justify-content:center;gap:10px;
  }
  .heroinfo .finfo .tc{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:.44rem;
    letter-spacing:.04em;color:#1B2430;
  }
  .heroinfo .fterps{
    font-family:'DM Sans',sans-serif;font-size:.4rem;line-height:1.3;
    color:#5C6771;margin-top:2px;font-weight:500;
  }
  @media(min-width:680px){
    .heroinfo .finfo .tc{font-size:.5rem}
    .heroinfo .fterps{font-size:.46rem}
  }
  #viewer .heroinfo{padding:0 12px 8px}
  #viewer .heroinfo .finfo{gap:16px}
  #viewer .heroinfo .finfo .tc{font-size:.66rem}
  #viewer .heroinfo .fterps{font-size:.6rem;margin-top:4px}
  /* phone thumbnails: show the numbers, just smaller */
  @media(max-width:679px){
    .grid .heroinfo{padding:0 4px 3px}
    .grid .heroinfo .finfo{gap:7px}
    .grid .heroinfo .finfo .tc{font-size:.4rem}
    .grid .heroinfo .fterps{font-size:.36rem;line-height:1.25;margin-top:1px}
  }
  .plate .txt .pts{
    font-family:'Oswald',sans-serif;font-weight:500;font-size:.46rem;
    letter-spacing:.1em;text-transform:uppercase;color:#8B959F;margin-top:3px;
  }
  @media(min-width:680px){.plate .txt .pts{font-size:.52rem}}
  #viewer .plate .txt .pts{font-size:.6rem;margin-top:4px}
  .plate .txt .pos{
    font-family:'Oswald',sans-serif;font-weight:500;font-size:.4rem;
    letter-spacing:.12em;text-transform:uppercase;color:var(--deep);margin-top:2px;
  }
  @media(min-width:680px){.plate .txt .pos{font-size:.54rem;letter-spacing:.16em}}

  /* ══ BACK ══ */
  .back{background:var(--border);padding:8px;display:flex}
  .sheet{
    flex:1;background:#fff;border-radius:2px;padding:11px 11px 10px;
    display:flex;flex-direction:column;color:#1B2430;overflow-y:auto;
  }
  .bh{
    display:flex;justify-content:space-between;align-items:flex-start;
    border-bottom:3px solid var(--border);padding-bottom:6px;gap:7px;
  }
  .bh .n{font-family:'Anton',sans-serif;font-size:.84rem;line-height:1;text-transform:uppercase}
  .bh .n small{
    display:block;font-family:'DM Sans',sans-serif;font-weight:500;
    text-transform:none;font-size:.52rem;color:#75808C;margin-top:3px;
  }
  .bh .no{font-family:'Anton',sans-serif;font-size:.58rem;color:var(--deep);flex:0 0 auto;white-space:nowrap}
  .h3{
    margin-top:8px;font-family:'Oswald',sans-serif;font-weight:600;
    font-size:.44rem;letter-spacing:.16em;text-transform:uppercase;color:#8B959F;
    border-bottom:1px solid #E4E8EB;padding-bottom:3px;
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .h3 em{
    font-style:normal;font-family:'DM Sans',sans-serif;font-weight:700;
    font-size:.44rem;letter-spacing:.02em;text-transform:none;color:var(--deep);
  }
  .tr{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid #EDF0F2}
  .tr .r{
    width:15px;height:15px;border-radius:50%;background:var(--border);color:#fff;
    font-family:'Oswald',sans-serif;font-weight:700;font-size:.46rem;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  }
  .tr .t{font-weight:700;font-size:.66rem}
  .tr .tn{
    font-weight:700;font-size:.6rem;font-family:'DM Sans',sans-serif;color:#1B2430;
    border:1px solid #D4D9DD;border-radius:3px;padding:2px 3px;max-width:112px;
    display:none;background:#fff;
  }
  .tr .x{
    margin-left:auto;font-family:'Oswald',sans-serif;font-size:.44rem;
    letter-spacing:.1em;text-transform:uppercase;color:#9AA3AC;
  }
  .tr .tp{
    margin-left:auto;width:42px;padding:2px 4px;font-size:.58rem;
    border:1px solid #D4D9DD;border-radius:3px;text-align:right;
    font-family:'DM Sans',sans-serif;color:#1B2430;display:none;
  }
  .sheet.editing .tr .t{display:none}
  .sheet.editing .tr .tn{display:inline-block}
  .sheet.editing .tr .x{display:none}
  .sheet.editing .tr .tp{display:inline-block}

  /* rating (on the card front, below the nameplate) */
  .rating{
    background:#fff;padding:7px 10px 9px;
    display:flex;align-items:center;justify-content:center;gap:8px;
    border-top:1px solid #EDF0F2;
  }
  .rating .lbl{
    font-family:'Oswald',sans-serif;font-size:.44rem;letter-spacing:.14em;
    text-transform:uppercase;color:#8B959F;font-weight:600;
  }
  .rating .stars{display:flex;gap:2px}
  .rating .star{
    cursor:pointer;font-size:.95rem;line-height:1;color:#D4D9DD;
    transition:color .12s,transform .12s;-webkit-tap-highlight-color:transparent;
  }
  .rating .star.on{color:#F5B301}
  .rating .star:active{transform:scale(1.2)}
  .rating .saved{
    font-family:'DM Sans',sans-serif;font-size:.42rem;color:var(--deep);
    opacity:0;transition:opacity .2s;
  }
  .rating .saved.show{opacity:1}
  #viewer .rating{margin-top:12px;padding-top:12px}
  #viewer .rating .lbl{font-size:.56rem}
  #viewer .rating .stars{gap:5px}
  #viewer .rating .star{font-size:1.5rem}
  #viewer .rating .saved{font-size:.56rem}

  /* ══ TRIAX ══ */
  .triax{margin-top:6px}
  .triax .m{margin-top:6px}
  .triax .m:first-child{margin-top:4px}
  .triax .hd{display:flex;justify-content:space-between;align-items:baseline}
  .triax .hd .k{font-family:'DM Sans',sans-serif;font-weight:700;font-size:.58rem}
  .triax .hd .v{font-family:'Anton',sans-serif;font-size:.76rem;line-height:1;transition:color .3s}
  .triax .track{
    position:relative;height:6px;border-radius:4px;background:#ECEEF0;
    margin-top:3px;overflow:hidden;
  }
  .triax .track::after{
    content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(27,36,48,.14);
  }
  .triax .fill{
    position:absolute;left:0;top:0;bottom:0;border-radius:4px;
    transition:width .6s cubic-bezier(.2,.8,.2,1),background-color .4s;
  }
  .triax .fill.ind{background:#4285F4}
  .triax .fill.sat{background:#F58A34}
  .triax .fill.hyb{background:#2FB457}
  .triax .sc{
    display:flex;justify-content:space-between;align-items:baseline;margin-top:2px;
    font-family:'Oswald',sans-serif;font-size:.38rem;color:#B4BCC4;letter-spacing:.06em;
  }
  .triax .sc .d{
    font-family:'DM Sans',sans-serif;font-weight:700;font-size:.46rem;
    color:#5C6771;letter-spacing:0;text-align:center;flex:1;
  }
  .triax .key{
    display:flex;justify-content:center;gap:8px;margin-top:7px;
    font-family:'DM Sans',sans-serif;font-size:.4rem;color:#75808C;
  }
  .triax .key span{display:flex;align-items:center;gap:3px}
  .triax .key i{width:5px;height:5px;border-radius:50%;display:block}

  .triax-toggle{
    font-family:'DM Sans',sans-serif;font-weight:700;font-size:.46rem;
    color:var(--deep);background:none;border:none;cursor:pointer;padding:0;margin-top:5px;
  }
  .triax-toggle:hover{text-decoration:underline}
  .triax-editbar{
    display:none;margin-top:5px;gap:5px;flex-wrap:wrap;align-items:center;
    background:#F6F8F9;border:1px solid #E4E8EB;border-radius:5px;padding:6px;
  }
  .sheet.editing .triax-editbar{display:flex}
  .triax-editbar label{
    display:flex;flex-direction:column;gap:1px;
    font-family:'Oswald',sans-serif;font-size:.36rem;letter-spacing:.08em;
    text-transform:uppercase;color:#8B959F;font-weight:600;
  }
  .triax-editbar input{
    width:42px;padding:2px 4px;font-size:.58rem;border:1px solid #D4D9DD;
    border-radius:3px;font-family:'DM Sans',sans-serif;
  }
  .triax-editbar .hint{
    flex-basis:100%;font-size:.4rem;color:#9AA3AC;line-height:1.4;margin-top:2px;
  }
  .triax-actions{margin-top:5px;display:none;gap:5px}
  .sheet.editing .triax-actions{display:flex}
  .triax-reset{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:.42rem;
    letter-spacing:.08em;text-transform:uppercase;border-radius:3px;
    padding:4px 8px;cursor:pointer;background:none;color:#8B959F;border:1px solid #D4D9DD;
  }
  .triax-badge{
    display:none;margin-top:5px;font-weight:700;font-size:.4rem;color:var(--deep);
    background:#F2F7FA;border-radius:3px;padding:3px 6px;
  }
  .sheet.recalculated .triax-badge{display:block}

  .facts{margin-top:8px;display:flex;gap:4px}
  .facts div{flex:1;background:#F2F5F7;border-radius:3px;padding:4px 5px;text-align:center}
  .facts .k{
    font-family:'Oswald',sans-serif;font-size:.38rem;letter-spacing:.1em;
    text-transform:uppercase;color:#8B959F;font-weight:600;
  }
  .facts .v{font-family:'Oswald',sans-serif;font-weight:600;font-size:.56rem;margin-top:1px}
  .bf{
    margin-top:auto;padding-top:8px;border-top:1px solid #E4E8EB;
    display:flex;justify-content:space-between;align-items:flex-end;
  }
  .bf .l{
    font-family:'Oswald',sans-serif;font-size:.38rem;letter-spacing:.08em;
    text-transform:uppercase;color:#9AA3AC;line-height:1.5;
  }
  .bf .mk{font-family:'Playfair Display',serif;font-weight:700;font-size:.54rem}
  .bf .mk b{color:var(--deep)}

  /* ══ FULL-SCREEN VIEWER ══
     Tap a card in the grid and it opens here, large enough that the
     back is actually readable and the recalculator is usable. Pinch to
     zoom in further; drag to pan when zoomed. */
  #viewer{
    position:fixed;inset:0;z-index:200;display:none;
    background:rgba(14,17,20,.93);backdrop-filter:blur(6px);
    padding:44px 14px 40px;
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    scrollbar-width:none;
  }
  #viewer::-webkit-scrollbar{display:none}
  #viewer.open{display:block}
  /* center the card horizontally, let it flow tall vertically */
  #viewer .vwrap{
    min-height:100%;display:flex;align-items:flex-start;justify-content:center;
  }
  #viewer.open{animation:vfade .18s ease}
  @keyframes vfade{from{opacity:0}to{opacity:1}}
  #viewer.open .vstage{animation:vpop .26s cubic-bezier(.2,.9,.25,1)}
  @keyframes vpop{from{transform:scale(.82);opacity:.4}to{transform:scale(1);opacity:1}}
  #viewer .vstage{
    width:min(420px,100%);
    perspective:1800px;
    transition:transform .22s cubic-bezier(.2,.8,.2,1);
    will-change:transform;transform-origin:top center;
  }
  #viewer .vstage.zoomed{transition:none}
  /* No 3D flip in the viewer — we swap faces by display so the back can
     flow tall for scrolling. Exactly one face shows at a time. */
  #viewer .scene{width:100%}
  #viewer .card{position:relative;width:100%;transform:none !important;transform-style:flat}
  #viewer .card .face{
    position:relative;inset:auto;transform:none !important;
    backface-visibility:visible;
  }
  /* default (front showing) */
  #viewer .card .front{display:flex;aspect-ratio:5/7}
  #viewer .card .back{display:none}
  /* flipped (back showing, tall) */
  #viewer .card.flipped .front{display:none}
  #viewer .card.flipped .back{display:flex}
  #viewer .vstage.zooming{transition:none}
  #viewer .card{cursor:pointer}
  /* The back's sheet is a scroll container (overflow-y:auto). Inside the
     viewer the browser was claiming touches on it for scrolling, so the
     pinch/pan handler never saw the moves — zoom worked on the front and
     died on the back. In here the card is big enough not to need its own
     scroll, so hand every touch to the gesture handler instead. */
  #viewer .face,
  #viewer .sheet,
  #viewer .stage{touch-action:none}
  /* the whole card is dragged as one piece — the back sheet grows to its
     content height rather than scrolling inside itself */
  #viewer .sheet{padding:16px 15px 14px;overflow:visible}
  /* the inputs still need normal touch behaviour */
  #viewer input,
  #viewer select,
  #viewer button{touch-action:auto}
  /* everything on the back gets bigger in here — the whole point */
  #viewer .bh .n{font-size:1.16rem}
  #viewer .bh .n small{font-size:.72rem}
  #viewer .bh .no{font-size:.78rem}
  #viewer .h3{font-size:.58rem;margin-top:12px;padding-bottom:5px}
  #viewer .h3 em{font-size:.6rem}
  #viewer .triax .hd .k{font-size:.8rem}
  #viewer .triax .hd .v{font-size:1.06rem}
  #viewer .triax .track{height:9px}
  #viewer .triax .sc{font-size:.52rem}
  #viewer .triax .sc .d{font-size:.64rem}
  #viewer .triax .key{font-size:.56rem;gap:12px;margin-top:10px}
  #viewer .triax-toggle{font-size:.66rem;margin-top:9px}
  #viewer .triax-editbar{padding:10px;gap:8px}
  #viewer .triax-editbar label{font-size:.5rem}
  #viewer .triax-editbar input{width:62px;padding:5px 6px;font-size:.8rem}
  #viewer .triax-editbar .hint{font-size:.56rem}
  #viewer .triax-reset{font-size:.58rem;padding:6px 12px}
  #viewer .triax-badge{font-size:.56rem;padding:5px 8px}
  #viewer .tr{padding:7px 0;gap:9px}
  #viewer .tr .r{width:20px;height:20px;font-size:.62rem}
  #viewer .tr .t{font-size:.9rem}
  #viewer .tr .tn{font-size:.8rem;padding:4px 5px;max-width:none;flex:1}
  #viewer .tr .tp{width:58px;padding:4px 6px;font-size:.78rem}
  #viewer .tr .x{font-size:.6rem}
  #viewer .facts{margin-top:12px;gap:6px}
  #viewer .facts .k{font-size:.5rem}

<script>
/* ── the engine: faithful port of the Calculator sheet ── */
function buildTriaxEngine(DATA) {
  const dbByName = {};
  DATA.database.forEach(r => { dbByName[r.name] = r; });

  function lookup(name) {
    return dbByName[name] || { name, cerebral: 0, somatic: 0, threshold: 0, volatility: 0, density: 0, clarity: 0, aroma: "" };
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // Excel ROUND: round half away from zero
  function excelRound(v) {
    return v >= 0 ? Math.floor(v + 0.5) : Math.ceil(v - 0.5);
  }

  function stripPrefix(name) {
    if (!name) return name;
    if (name.startsWith("Beta-")) return name.slice(5);
    if (name.startsWith("Alpha-")) return name.slice(6);
    return name;
  }

  const CEREBRAL_LABELS = ["deeply suppressed", "dulled", "mildly clouded", "soft", "quiet", "clear", "gently lifted", "alert", "stimulating", "sharp", "electric"];
  const SOMATIC_LABELS = ["narcotic, immobilizing", "heavy, sedating", "deeply relaxed", "relaxed", "grounded", "neutral", "subtle body lift", "light, mobile", "energizing", "very energizing", "activating"];
  const OVERALL_LABELS = ["Narcotic Gravity (Very Sedating)", "Tranquilizing", "Sedative", "Heavy Hybrid", "Grounded / Calm", "Balanced", "Bright / Light Uplift", "Upbeat Hybrid", "Functional Stimulating", "High Velocity", "Electric Cerebral (Very Energizing)"];

  function chooseLabel(arr, score) {
    return arr[clamp(score, -5, 5) + 5];
  }

  function profileType(cer, som) {
    if (cer >= 3 && som >= -1) return "Heady Sativa";
    if (cer >= 3 && som <= -2) return "Energetic Hybrid";
    if (cer <= -1 && som <= -3) return "Narcotic Indica";
    if (cer <= 1 && cer >= -1 && som <= -3) return "Couch-Lock Indica";
    if (cer <= 1 && cer >= -1 && som <= -1) return "Body-Forward Hybrid";
    if (cer >= 1 && som <= -1) return "Functional Hybrid";
    if (cer <= 1 && cer >= -1 && som <= 1 && som >= -1) return "Balanced";
    return "Unusual profile";
  }

  function fmt1(n) { return (Math.round(n * 10) / 10).toFixed(1); }

  function calculate(input) {
    const t1 = input.t1, t2 = input.t2, t3 = input.t3 || "(none)";
    const p1 = Number(input.p1) || 0, p2 = Number(input.p2) || 0, p3 = Number(input.p3) || 0;
    const thc = Number(input.thc) || 0;
    const cbd = Number(input.cbd) || 0;
    const totalTerp = Number(input.totalTerp) || 0;
    const species = input.species || "Hybrid"; // "Indica" | "Sativa" | "Hybrid"

    const d1 = lookup(t1), d2 = lookup(t2), d3 = lookup(t3);

    const above1 = p1 >= d1.threshold;
    const above2 = p2 >= d2.threshold;
    const above3 = p3 >= d3.threshold;

    const sumP = p1 + p2 + p3;

    // Step 1: Base Vector
    let baseCer, baseSom;
    if (sumP > 0) {
      baseCer = (above1 ? d1.cerebral : 0) * (p1 / sumP) + (above2 ? d2.cerebral : 0) * (p2 / sumP) + (above3 ? d3.cerebral : 0) * (p3 / sumP);
      baseSom = (above1 ? d1.somatic : 0) * (p1 / sumP) + (above2 ? d2.somatic : 0) * (p2 / sumP) + (above3 ? d3.somatic : 0) * (p3 / sumP);
    } else {
      baseCer = (d1.cerebral + d2.cerebral + d3.cerebral) / 3;
      baseSom = (d1.somatic + d2.somatic + d3.somatic) / 3;
    }

    // Step 2: Synergy
    const selected = new Set([t1, t2, t3]);
    let synCer = 0, synSom = 0;
    DATA.synergies.forEach(row => {
      if (selected.has(row.a) && selected.has(row.b)) {
        synCer += row.cerebral;
        synSom += row.somatic;
      }
    });

    // Step 3: Conflict
    const cerVals = [d1.cerebral, d2.cerebral, d3.cerebral];
    const somVals = [d1.somatic, d2.somatic, d3.somatic];
    const conflictCer = (Math.max(...cerVals) >= 4 && Math.min(...cerVals) <= -4) ? -1 : 0;
    const conflictSom = (Math.max(...somVals) >= 4 && Math.min(...somVals) <= -4) ? -1 : 0;

    // Steps 4-6: Volatility -> Cerebral, Density -> Somatic, Clarity -> Cerebral
    const volCer = d1.volatility + d2.volatility + d3.volatility;
    const densSom = -(d1.density + d2.density + d3.density);
    const clarCer = d1.clarity + d2.clarity + d3.clarity;

    // Step 7: Raw Score
    const cerRaw = baseCer + synCer + conflictCer + volCer + 0 + clarCer;
    const somRaw = baseSom + synSom + conflictSom + 0 + densSom + 0;
    const overallRaw = (Math.abs(cerRaw) + Math.abs(somRaw) === 0) ? 0 :
      (Math.abs(cerRaw) * cerRaw + Math.abs(somRaw) * somRaw) / (Math.abs(cerRaw) + Math.abs(somRaw));

    // Modulators
    const loadMultiplier = clamp(0.5 + (totalTerp / 1.5) * 0.5, 0.5, 1.5);
    const thcAmplifier = clamp(1 + ((thc - 20) / 20) * 0.4, 0.6, 1.4);
    const cbdDampener = thc === 0 ? 1 : Math.max(0.6, 1 - Math.min(1, cbd / thc) * 0.4);

    const cerMod = cerRaw * loadMultiplier * thcAmplifier * cbdDampener;
    const somMod = somRaw * loadMultiplier * thcAmplifier * cbdDampener;
    const overallMod = overallRaw * loadMultiplier * thcAmplifier * cbdDampener;

    // Step 8: Final Scores (the "|| 0" strips negative-zero display artifacts)
    let cerFinal = clamp(excelRound(cerMod), -5, 5) || 0;
    let somFinal = clamp(excelRound(somMod), -5, 5) || 0;
    let overallFinal = clamp(excelRound(overallMod), -5, 5) || 0;

    // Species Nudge — not part of the original per-terpene math; a small,
    // EXACT +/-1 point adjustment for the strain label itself (genetics /
    // expectation signal beyond what terpenes + cannabinoids capture on
    // their own). Applied to the already-rounded final score, after every
    // other modulator, so it's always precisely 1 point — never scaled up
    // or down by THC/terpene load. Sativa: +1 Cerebral. Indica: -1 Somatic.
    // Hybrid: no nudge. Overall is then re-derived from the nudged axes
    // using the same weighted-blend shape as Overall Raw, since Overall is
    // documented as "a derived view, not a separate calculation."
    const speciesNudgeCer = species === "Sativa" ? 1 : 0;
    const speciesNudgeSom = species === "Indica" ? -1 : 0;
    cerFinal = clamp(cerFinal + speciesNudgeCer, -5, 5) || 0;
    somFinal = clamp(somFinal + speciesNudgeSom, -5, 5) || 0;

    if (speciesNudgeCer !== 0 || speciesNudgeSom !== 0) {
      const denom = Math.abs(cerFinal) + Math.abs(somFinal);
      const overallFromFinals = denom === 0 ? 0 : (Math.abs(cerFinal) * cerFinal + Math.abs(somFinal) * somFinal) / denom;
      overallFinal = clamp(excelRound(overallFromFinals), -5, 5) || 0;
    }

    const profile = profileType(cerFinal, somFinal);
    const cerLabel = chooseLabel(CEREBRAL_LABELS, cerFinal);
    const somLabel = chooseLabel(SOMATIC_LABELS, somFinal);
    const overallLabel = chooseLabel(OVERALL_LABELS, overallFinal);

    // Aroma prominence
    function prominence(p) {
      if (p === 0) return "—";
      const share = p / sumP;
      if (share >= 0.45) return "DOMINANT";
      if (share >= 0.22) return "Supporting";
      return "trace";
    }

    const aroma = [
      { name: t1, prominence: prominence(p1), notes: d1.aroma },
      { name: t2, prominence: prominence(p2), notes: d2.aroma },
      { name: t3, prominence: prominence(p3), notes: d3.aroma }
    ];

    // Sommelier Blend
    const strip1 = stripPrefix(t1), strip2 = stripPrefix(t2), strip3 = stripPrefix(t3);
    const sorted = [strip1, strip2, strip3].slice().sort();
    const blendKey = sorted.join("|");
    const blendMatch = DATA.blends.find(b => b.key === blendKey);
    let sommelierBlend;
    if (blendMatch) {
      sommelierBlend = blendMatch.desc;
    } else {
      const a1 = lookup(sorted[0]).aroma || "";
      const a2 = lookup(sorted[1]).aroma || "";
      const a3name = sorted[2];
      const a3 = lookup(a3name).aroma || "";
      const cap = a1.length ? a1[0].toUpperCase() + a1.slice(1) : a1;
      let desc = cap + (a2 ? ", combined with " + a2 : "");
      if (a3name && a3name !== "(none)" && a3) {
        desc += ", and " + a3;
      }
      sommelierBlend = desc + ".";
    }

    // Strength Read
    let strength = "";
    if (totalTerp >= 2.5) strength += `Terpene-rich at ${fmt1(totalTerp)}% total — expect a vivid, pronounced experience. `;
    else if (totalTerp >= 1.5) strength += `Moderate terpene load at ${fmt1(totalTerp)}% total — typical BC flower expression. `;
    else if (totalTerp > 0) strength += `Light terpene load at ${fmt1(totalTerp)}% total — subtle expression. `;

    if (thc >= 28) strength += `THC is high at ${fmt1(thc)}% — effects will lean toward both axis extremes. `;
    else if (thc >= 18) strength += `THC at ${fmt1(thc)}% is typical — predicted effects track the ratings directly. `;
    else if (thc > 0) strength += `THC at ${fmt1(thc)}% is mild — predicted effects may feel gentler than the ratings suggest. `;

    if (thc > 0) {
      const ratio = cbd / thc;
      if (ratio >= 1) strength += `CBD-dominant chemistry (${fmt1(cbd)}% CBD) — expect strongly buffered, mild experience.`;
      else if (ratio >= 0.3) strength += `Significant CBD content (${fmt1(cbd)}%) — softens both extremes.`;
      else if (ratio >= 0.05) strength += `Modest CBD (${fmt1(cbd)}%) — slight modulation.`;
      else strength += `Trace CBD — negligible modulation.`;
    }

    return {
      baseCer, baseSom, synCer, synSom, conflictCer, conflictSom, volCer, densSom, clarCer,
      speciesNudgeCer, speciesNudgeSom,
      cerRaw, somRaw, overallRaw, loadMultiplier, thcAmplifier, cbdDampener,
      cerMod, somMod, overallMod,
      cerFinal, somFinal, overallFinal,
      profile, cerLabel, somLabel, overallLabel,
      aroma, sommelierBlend, strength
    };
  }

  return { calculate, lookup, stripPrefix };
}

};

  if (!raw) return "(none)";

function stripPrefix(n) {
  if (!n) return n;

}
// The blends table is keyed on the three terpenes, sorted, un-prefixed.
function blendFor(terps) {
  if (!terps || terps.length < 3 || !TRIAX_DATA.blends) return "";
  const key = terps.map(t => stripPrefix(resolveTerp(t))).sort().join("|");
  const hit = TRIAX_DATA.blends.find(b => b.key === key);
  return hit ? firstSentence(hit.desc) : "";
}
function firstSentence(text) {
  if (!text) return "";
  const t = String(text).trim();
  const m = t.match(/^.*?[.!?](\s|$)/);
  const s = (m ? m[0] : t).trim();
  return s.length > 150 ? s.slice(0, 147).trimEnd() + "…" : s;
}

function cardHTML(p, scan, idx) {
  const cls = speciesClass(p);
  const sp = speciesName(p);
  const terps = (p.terpenes || []).slice(0, 3);
  // About a quarter of the BCLDB catalog publishes no terpene profile at all.
  // Those products get three blank, editable slots so a customer can enter the
  // terpenes printed on their package - TRIAX then calculates from that input.
  const noTerps = terps.length === 0;
  const terpSlots = noTerps ? ["(none)", "(none)", "(none)"] : terps;
  let tri = p.triax || {};
  let hasTriax = tri.cerebral !== undefined && tri.cerebral !== null;
  // Fallback: if the catalog did not supply TRIAX, compute it on-device from the
  // terpene names using the built-in engine (equal-weighted, neutral label).
  if (!hasTriax && typeof ENGINE !== "undefined") {
    try {
      const rt = terpSlots.map(resolveTerp);
      const rr = ENGINE.calculate({
        t1: rt[0] || "(none)", p1: 0,
        t2: rt[1] || "(none)", p2: 0,
        t3: rt[2] || "(none)", p3: 0,
        thc: midpoint(p.thc), cbd: 0, totalTerp: 1.5, species: sp
      });
      tri = {
        cerebral: rr.cerFinal, somatic: rr.somFinal, overall: rr.overallFinal,
        cerebral_desc: rr.cerLabel, somatic_desc: rr.somLabel, overall_desc: rr.overallLabel,
        leaning: leanLabel(rr.overallFinal)
      };
      hasTriax = true;
    } catch (e) {}
  }

  // the user's saved label for this product (rating + entered percentages)
  const savedPref = (typeof labelOf === "function") ? labelOf(scan && scan.gtin) : {};
  const fmtPct = n => {
    const x = Number(n);
    return (x % 1 === 0) ? x + "%" : (Math.round(x * 100) / 100) + "%";
  };
  // THC/CBD: show the user's entered value if they gave one, else catalog range
  const thcDisplay = (savedPref && savedPref.thc != null) ? fmtPct(savedPref.thc) : (p.thc || "\u2014");
  const cbdDisplay = (savedPref && savedPref.cbd != null) ? fmtPct(savedPref.cbd) : (p.cbd || "\u2014");
  // per-position saved terpene %
  const savedTerpPct = [savedPref.p1, savedPref.p2, savedPref.p3];

  // the logo stands alone — if it fails to load, the brand name takes its place
  const logoSrc = p.logo || (typeof brandLogo === "function" ? brandLogo(p.brand) : "");
  const logoImg = logoSrc
    ? `<img src="${esc(logoSrc)}" alt="${esc(p.brand)}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'wm',textContent:${JSON.stringify(p.brand || "")}}))">`
    : `<div class="wm">${esc(p.brand || "Unknown")}</div>`;

  // A short line of character above the numbers. The sommelier blend
  // description (written for this exact terpene trio) beats the BCLDB
  // marketing copy when we have one; otherwise trim the catalog text.
  const blurb = blendFor(terps) || firstSentence(p.description);

  // a compact terpene line for the FRONT: "Myrcene 0.9% · Limonene 0.3% · …"
  const frontTerps = terps.map((t, i) => {
    const pc = savedTerpPct[i];
    return esc(t) + (pc != null ? " " + fmtPct(pc) : "");
  }).join(" \u00b7 ");

  const axis = (key, label, val, desc) => `
        <div class="m" data-axis="${key}">
          <div class="hd"><span class="k">${label}</span><span class="v">${val > 0 ? "+" : ""}${val}</span></div>
          <div class="track"><span class="fill ${fillClass(val)}" style="width:${widthPct(val)}%"></span></div>
          <div class="sc"><span>-5</span><span class="d">${esc(desc || leanLabel(val))}</span><span>+5</span></div>
        </div>`;

  const triaxBlock = hasTriax ? `
      <div class="h3">TRIAX Profile <em class="lean">${noTerps ? "Add terpenes to rate" : esc(tri.leaning || leanLabel(tri.overall))}</em></div>
      <div class="triax">
${axis("cer",  "Cerebral", tri.cerebral, tri.cerebral_desc)}
${axis("som",  "Somatic",  tri.somatic,  tri.somatic_desc)}
${axis("over", "Overall",  tri.overall,  tri.overall_desc)}
        <div class="key">
          <span><i style="background:#4285F4"></i>Indica</span>
          <span><i style="background:#2FB457"></i>Hybrid</span>
          <span><i style="background:#F58A34"></i>Sativa</span>
        </div>
        ${noTerps ? `<div class="triax-noterp">No terpene profile is published for this product. Add the terpenes listed on your package below and the TRIAX rating will calculate.</div>` : ``}
        <button class="triax-toggle" type="button">${noTerps ? "Add terpenes →" : "Enter your label →"}</button>
        <div class="triax-editbar">
          <label>THC % <input type="number" class="in-thc" step="0.1" min="0" max="100" placeholder="${Math.round(midpoint(p.thc))}"></label>
          <label>CBD % <input type="number" class="in-cbd" step="0.1" min="0" max="100" placeholder="0"></label>
          <label>Total terp % <input type="number" class="in-tt" step="0.1" min="0" max="15" placeholder="auto"></label>
          <div class="hint">Your package or COA lists real percentages. Type them in — the bars recalculate live. You can also swap a terpene if your COA names a different one.</div>
        </div>
        <div class="triax-actions">
          <button class="triax-reset" type="button">Reset to as-reported</button>
        </div>
        <div class="triax-badge">✓ Recalculated from your label</div>
      </div>` : "";

  const terpRows = terpSlots.map((t, i) => {
    const r = resolveTerp(t);
    const pc = savedTerpPct[i];
    const blank = noTerps && r === "(none)";
    const nameWithPct = blank ? "Tap to add" : esc(t) + (pc != null ? " " + fmtPct(pc) : "");
    return `      <div class="tr" data-terp="${esc(r)}">
        <span class="r">${i + 1}</span>
        <span class="t"${blank ? ` style="color:#9AA3AC;font-weight:400"` : ``}>${nameWithPct}</span>
        <select class="tn"></select>
        <span class="x">${esc(AROMA_NOTE[r] || "")}</span>
        <input class="tp" type="number" step="0.01" min="0" placeholder="%">
      </div>`;
  }).join("\n");

  return `
  <div class="scene ${cls}">
    <div class="card" tabindex="0" role="button" aria-label="Flip ${esc(p.name)}">

      <div class="face front">
        <div class="stage">
          <span class="cardno">No. ${esc(p.sku || "—")}</span>
          <div class="hero">
            <div class="mark">
              ${logoImg}
            </div>
          </div>
          <div class="heroinfo">
            <div class="finfo"><span class="tc">THC ${esc(thcDisplay)}</span><span class="tc">CBD ${esc(cbdDisplay)}</span></div>
            ${frontTerps ? `<div class="fterps">${frontTerps}</div>` : ""}
          </div>
          <div class="plate">
            <div class="burst"></div>
            <div class="txt">
              <div class="nm">${esc(p.name || "Unknown")}</div>
              <div class="pos">${esc(sp)}</div>
              ${(p.category || p.size) ? `<div class="pts">${esc([p.category, p.size].filter(Boolean).join(" · "))}</div>` : ""}
            </div>
          </div>
          <div class="rating" data-gtin="${esc(scan.gtin || "")}">
            <span class="stars" role="radiogroup" aria-label="Rate 1 to 5 stars">
              ${[1,2,3,4,5].map(n => `<span class="star" data-v="${n}" role="radio" tabindex="0" aria-label="${n} star">★</span>`).join("")}
            </span>
            <span class="saved">Saved \u2713</span>
          </div>
        </div>
      </div>

      <div class="face back">
        <div class="sheet">
          <div class="bh">
            <div class="n">${esc(p.name || "Unknown")}<small>${esc(p.brand || "")}${p.category ? " · " + esc(p.category) : ""}</small></div>
            <div class="no">${esc(p.sku || "")}</div>
          </div>
${triaxBlock}
          <div class="h3">Prominent Terpenes</div>
${terpRows}
          <div class="bf">
            <div class="l">${scan.lot ? "Lot " + esc(scan.lot) + "<br>" : ""}Scanned ${esc((scan.at || "").slice(0, 10))}</div>
            <div class="mk">The <b>Terpene</b> Sommelier</div>
          </div>
        </div>
      </div>

    </div>
  </div>`;
}

/* ══ LIVE RECALCULATION ══
   Wires flipping + the TRIAX recalculator onto a card. Used for the
   card inside the full-screen viewer; grid cards are display-only and
   just open the viewer when tapped. */
function wireCard(scene, p, {flippable = true} = {}) {
  const card = scene.querySelector(".card");
  const sheet = scene.querySelector(".sheet");

  // flip — but never when the tap lands on a control
  const isCtrl = e => e.target.closest("select,input,button,.triax-editbar,.triax-actions,.rating");
  if (flippable) {
    card.addEventListener("click", e => {
      if (isCtrl(e)) return;
      if (typeof zoom !== "undefined" && zoom > 1.05) return;
      card.classList.toggle("flipped");
      // start each face at the top
      const v = document.getElementById("viewer");
      if (v) v.scrollTop = 0;
    });
    card.addEventListener("keydown", e => {
      if ((e.key === " " || e.key === "Enter") && !isCtrl(e)) { e.preventDefault(); card.classList.toggle("flipped"); }
    });
  }

  // star rating (now on the front — search the whole card)
  const ratingEl = card.querySelector(".rating");
  if (ratingEl) {
    const gtin = ratingEl.dataset.gtin;
    const stars = [...ratingEl.querySelectorAll(".star")];
    const savedTag = ratingEl.querySelector(".saved");
    let current = ratingOf(gtin);
    const paint = n => stars.forEach((s, i) => s.classList.toggle("on", i < n));
    paint(current);
    stars.forEach((star, i) => {
      const val = i + 1;
      star.addEventListener("mouseenter", () => paint(val));
      const commit = async () => {
        current = val; paint(val);
        RATINGS[gtin] = Object.assign({}, labelOf(gtin), { rating: val });
        if (typeof paintThumbStars === "function") paintThumbStars(gtin);  // live thumbnail update
        if (typeof refreshThumb === "function") refreshThumb(gtin);
        savedTag.classList.add("show");
        await savePrefs(gtin, { rating: val });
        setTimeout(() => savedTag.classList.remove("show"), 1400);
      };
      star.addEventListener("click", commit);
      star.addEventListener("keydown", e => {
        if (e.key === " " || e.key === "Enter") { e.preventDefault(); commit(); }
      });
    });
    ratingEl.addEventListener("mouseleave", () => paint(current));
  }

  const triax = sheet.querySelector(".triax");
  if (!triax) return;                       // no TRIAX for this product

  const prodGtin = (card.querySelector(".rating") || {}).dataset ? card.querySelector(".rating").dataset.gtin : (scan && scan.gtin) || "";

  const toggle = sheet.querySelector(".triax-toggle");
  const resetBtn = sheet.querySelector(".triax-reset");
  const thcIn = sheet.querySelector(".in-thc");
  const cbdIn = sheet.querySelector(".in-cbd");
  const ttIn  = sheet.querySelector(".in-tt");
  const rows  = [...sheet.querySelectorAll(".tr[data-terp]")];
  const leanEl = sheet.querySelector(".h3 em.lean");

  const thcDefault = midpoint(p.thc);
  const NEUTRAL_TT = 1.5;
  const species = speciesName(p);

  // the as-reported baseline, straight from the main app
  const base = {
    lean: leanEl.textContent,
    axes: {},
    terps: rows.map(r => ({ label: r.querySelector(".t").textContent, resolved: r.dataset.terp }))
  };
  ["cer", "som", "over"].forEach(a => {
    const m = triax.querySelector(`.m[data-axis="${a}"]`);
    base.axes[a] = {
      score: parseInt(m.querySelector(".hd .v").textContent, 10),
      desc: m.querySelector(".sc .d").textContent
    };
  });

  rows.forEach((row, i) => {
    const sel = row.querySelector(".tn");
    sel.add(new Option("— select terpene —", "(none)"));
    TERP_LIST.forEach(n => sel.add(new Option(n, n)));
    sel.value = base.terps[i].resolved;
  });

  const applyAxis = (a, score, desc) => {
    const m = triax.querySelector(`.m[data-axis="${a}"]`);
    m.querySelector(".hd .v").textContent = (score > 0 ? "+" : "") + score;
    const f = m.querySelector(".fill");
    f.style.width = widthPct(score) + "%";
    f.classList.remove("ind", "sat", "hyb");
    f.classList.add(fillClass(score));
    m.querySelector(".sc .d").textContent = desc;
  };

  const untouched = () =>
    rows.every((r, i) => r.querySelector(".tn").value === base.terps[i].resolved) &&
    rows.every(r => !r.querySelector(".tp").value.trim()) &&
    !thcIn.value.trim() && !cbdIn.value.trim() && !ttIn.value.trim();

  function showBaseline() {
    applyAxis("cer",  base.axes.cer.score,  base.axes.cer.desc);
    applyAxis("som",  base.axes.som.score,  base.axes.som.desc);
    applyAxis("over", base.axes.over.score, base.axes.over.desc);
    leanEl.textContent = base.lean;
    rows.forEach((r, i) => {
      r.dataset.terp = base.terps[i].resolved;
      r.querySelector(".t").textContent = base.terps[i].label;
      r.querySelector(".tn").value = base.terps[i].resolved;
    });
    sheet.classList.remove("recalculated");
  }

  function recalc() {
    if (untouched()) { showBaseline(); return; }

    const t = rows.map(r => r.querySelector(".tn").value);
    const pc = rows.map(r => parseFloat(r.querySelector(".tp").value) || 0);
    const thc = thcIn.value.trim() ? (parseFloat(thcIn.value) || 0) : thcDefault;
    const cbd = parseFloat(cbdIn.value) || 0;
    const entered = pc.reduce((a, b) => a + b, 0);
    const tt = ttIn.value.trim() ? (parseFloat(ttIn.value) || 0)
             : entered > 0 ? entered : NEUTRAL_TT;

    const r = ENGINE.calculate({
      t1: t[0], p1: pc[0], t2: t[1] || "(none)", p2: pc[1] || 0,
      t3: t[2] || "(none)", p3: pc[2] || 0,
      thc, cbd, totalTerp: tt, species
    });

    applyAxis("cer",  r.cerFinal,     r.cerLabel);
    applyAxis("som",  r.somFinal,     r.somLabel);
    applyAxis("over", r.overallFinal, r.overallLabel);
    leanEl.textContent = leanLabel(r.overallFinal);

    t.forEach((name, i) => {
      rows[i].dataset.terp = name;
      rows[i].querySelector(".t").textContent = name;
      rows[i].querySelector(".x").textContent = AROMA_NOTE[name] || "";
    });
    sheet.classList.add("recalculated");
  }

  toggle.addEventListener("click", () => {
    sheet.classList.add("editing");
    toggle.style.display = "none";
  });
  resetBtn.addEventListener("click", () => {
    sheet.classList.remove("editing");
    toggle.style.display = "inline-block";
    thcIn.value = cbdIn.value = ttIn.value = "";
    rows.forEach(r => r.querySelector(".tp").value = "");
    showBaseline();
  });

  // persist the entered percentages (debounced) whenever they change
  let saveTimer = null;
  const numOrEmpty = el => (el && el.value.trim() !== "") ? (parseFloat(el.value) || 0) : "";
  function persistLabel() {
    const fields = {
      totalTerp: numOrEmpty(ttIn),
      p1: rows[0] ? numOrEmpty(rows[0].querySelector(".tp")) : "",
      p2: rows[1] ? numOrEmpty(rows[1].querySelector(".tp")) : "",
      p3: rows[2] ? numOrEmpty(rows[2].querySelector(".tp")) : "",
      thc: numOrEmpty(thcIn),
      cbd: numOrEmpty(cbdIn)
    };
    RATINGS[prodGtin] = Object.assign({}, labelOf(prodGtin), fields);
    refreshFront();                       // live-update the enlarged card front
    if (typeof refreshThumb === "function") refreshThumb(prodGtin);  // and the thumbnail
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => savePrefs(prodGtin, fields), 600);
  }

  // repaint the front THC/CBD blocks and terpene line from saved values
  function refreshFront() {
    const front = card.querySelector(".front");
    if (!front) return;
    const sp2 = labelOf(prodGtin);
    const fmt = n => { const x = Number(n); return (x % 1 === 0 ? x : Math.round(x*100)/100) + "%"; };
    const tcs = front.querySelectorAll(".heroinfo .finfo .tc");
    if (tcs[0]) tcs[0].textContent = "THC " + (sp2.thc != null ? fmt(sp2.thc) : (p.thc || "\u2014"));
    if (tcs[1]) tcs[1].textContent = "CBD " + (sp2.cbd != null ? fmt(sp2.cbd) : (p.cbd || "\u2014"));
    const line = front.querySelector(".heroinfo .fterps");
    if (line) {
      const names = rows.map(r => r.querySelector(".t").textContent.replace(/\s+[\d.]+%?.*$/, ""));
      const pcs = [sp2.p1, sp2.p2, sp2.p3];
      line.textContent = names.map((n, i) => n + (pcs[i] != null ? " " + fmt(pcs[i]) : "")).join(" \u00b7 ");
    }
  }

  rows.forEach(r => {
    r.querySelector(".tn").addEventListener("change", recalc);
    r.querySelector(".tp").addEventListener("input", () => { recalc(); persistLabel(); });
  });
  ttIn.addEventListener("input", () => { recalc(); persistLabel(); });
  [thcIn, cbdIn].forEach(i => i.addEventListener("input", () => { recalc(); persistLabel(); }));

  // ── prefill persisted percentages, and show Stage-2 bars by default ──
  const saved = labelOf(prodGtin);
  const hasSavedPct = saved && (saved.totalTerp != null || saved.p1 != null || saved.p2 != null || saved.p3 != null || saved.thc != null || saved.cbd != null);
  if (hasSavedPct || saved.thc != null || saved.cbd != null) {
    if (saved.totalTerp != null) ttIn.value = saved.totalTerp;
    if (saved.p1 != null && rows[0]) rows[0].querySelector(".tp").value = saved.p1;
    if (saved.p2 != null && rows[1]) rows[1].querySelector(".tp").value = saved.p2;
    if (saved.p3 != null && rows[2]) rows[2].querySelector(".tp").value = saved.p3;
    if (saved.thc != null) thcIn.value = saved.thc;
    if (saved.cbd != null) cbdIn.value = saved.cbd;
    // reveal the editor (so the prefilled numbers are visible) and recalc
    sheet.classList.add("editing");
    toggle.style.display = "none";
    recalc();
  }
}


/* ══ FULL-SCREEN VIEWER ══
   A card in the grid is a thumbnail. Tapping it opens the real thing —
   big enough to read the TRIAX bars and actually use the recalculator.
   Pinch to zoom past that; drag to pan once zoomed. */
const viewer = document.getElementById("viewer");
const vstage = document.getElementById("vstage");
const vclose = document.getElementById("vclose");

let zoom = 1, panX = 0, panY = 0;
const MIN_ZOOM = 1, MAX_ZOOM = 4;

// How far the card can travel before its edge pulls inside the screen.
// At scale z the card renders w*z wide, so the overhang each side is
// (w*z - viewportW)/2 — that's exactly how far panning may go.
function applyTransform() { /* pan removed — native scroll handles it */ }
function resetZoom() {
  zoom = 1;
  vstage.style.transform = "";
  vstage.classList.remove("zoomed");
  viewer.scrollTop = 0;
}

// repaint a grid thumbnail's stars from the current RATINGS value
function paintThumbStars(gtin) {
  const score = ratingOf(gtin);
  document.querySelectorAll(`.grid .scene[data-gtin="${cssEscape(gtin)}"] .rating .star`).forEach((s, i) => {
    s.classList.toggle("on", i < score);
  });
}

// Re-render a grid thumbnail's card from the latest data (saved THC/CBD,
// terpene %, rating). Called live while editing and on viewer close, so the
// thumbnail always mirrors the enlarged card without a page reload.
function refreshThumb(gtin) {
  const scene = document.querySelector(`.grid .scene[data-gtin="${cssEscape(gtin)}"]`);
  const entry = PRODUCTS[gtin];
  if (!scene || !entry) return;
  const wasFlipped = scene.querySelector(".card")?.classList.contains("flipped");
  scene.innerHTML = cardHTML(entry.p, entry.scan);
  scene.dataset.gtin = gtin;
  paintThumbStars(gtin);
  // thumbnails open the viewer on tap — re-bind that handler
  const card = scene.querySelector(".card");
  if (card) {
    const open = () => openViewer(entry.p, entry.scan);
    card.addEventListener("click", e => { if (!e.target.closest(".rating")) open(); });
    card.addEventListener("keydown", e => {
      if ((e.key === " " || e.key === "Enter") && !e.target.closest(".rating")) { e.preventDefault(); open(); }
    });
    if (wasFlipped) card.classList.add("flipped");
  }
}
function cssEscape(s) {
  return String(s).replace(/["\\]/g, "\\$&");
}

let openGtin = null;   // gtin of the product currently in the viewer
function openViewer(p, scan) {
  openGtin = scan && scan.gtin || "";
  vstage.innerHTML = cardHTML(p, scan);
  const scene = vstage.querySelector(".scene");
  wireCard(scene, p, {flippable: true});
  resetZoom();
  viewer.classList.add("open");
  viewer.setAttribute("aria-hidden", "false");
  document.body.style.overflow = "hidden";
}
function closeViewer() {
  const g = openGtin;
  viewer.classList.remove("open");
  viewer.setAttribute("aria-hidden", "true");
  vstage.innerHTML = "";
  document.body.style.overflow = "";
  openGtin = null;
  if (g) { paintThumbStars(g); refreshThumb(g); }   // thumbnail mirrors any edits
}

vclose.addEventListener("click", closeViewer);
// tapping the dimmed backdrop closes; tapping the card itself doesn't
viewer.addEventListener("click", e => { if (e.target === viewer) closeViewer(); });
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && viewer.classList.contains("open")) closeViewer();
});

/* ── gestures in the viewer ──
   The viewer is a native scroll container and the card flows tall inside
   it, so dragging one finger scrolls the card up and down for free — no
   custom pan code, no clamping, works on the front and the (tall) back.
   We only add: two-finger pinch-zoom, and double-tap to toggle 2x. */
const pts = new Map();
let startDist = 0, startZoom = 1, zoomOriginY = 0;
let multiTouch = false, lastTap = 0;

const dist = () => {
  const [a, b] = [...pts.values()];
  return Math.hypot(a.x - b.x, a.y - b.y);
};
const midY = () => {
  const v = [...pts.values()];
  return v.length === 2 ? (v[0].y + v[1].y) / 2 : 0;
};
const isCtrlTarget = e => e.target.closest("select,input,button,.triax-editbar,.triax-actions");

function setZoom(z) {
  zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, z));
  vstage.style.transform = zoom === 1 ? "" : `scale(${zoom})`;
  vstage.classList.toggle("zoomed", zoom !== 1);
}

vstage.addEventListener("pointerdown", e => {
  if (isCtrlTarget(e)) return;
  pts.set(e.pointerId, {x: e.clientX, y: e.clientY});
  if (pts.size >= 2) {
    multiTouch = true;
    startDist = dist();
    startZoom = zoom;
  }
});

vstage.addEventListener("pointermove", e => {
  if (!pts.has(e.pointerId)) return;
  pts.set(e.pointerId, {x: e.clientX, y: e.clientY});
  if (pts.size >= 2 && startDist > 0) {
    e.preventDefault();                         // pinch, don't scroll
    setZoom(startZoom * (dist() / startDist));
  }
  // single finger falls through to native scroll — nothing to do
}, {passive: false});

function endPointer(e) {
  const wasCtrl = isCtrlTarget(e);
  const had = pts.delete(e.pointerId);
  if (pts.size < 2) startDist = 0;
  if (pts.size === 0) {
    if (multiTouch) {
      multiTouch = false; lastTap = 0;
      if (zoom <= 1.02) setZoom(1);
      return;
    }
    // double-tap toggles 2x (single tap flips, handled by the card click)
    if (had && !wasCtrl) {
      const now = Date.now();
      if (now - lastTap < 280) { setZoom(zoom > 1.05 ? 1 : 2); lastTap = 0; }
      else lastTap = now;
    }
  }
}
vstage.addEventListener("pointerup", endPointer);
vstage.addEventListener("pointercancel", endPointer);

/* ══ LOAD ══ */
// saves the rating and/or the entered label percentages for a product.
// Pass only what changed; the Sheet merges onto the existing row.
async function savePrefs(gtin, fields) {
  try {
    await fetch(READ_URL, {
      method: "POST",
      headers: {"Content-Type": "text/plain;charset=utf-8"},
      body: JSON.stringify(Object.assign({ type: "rating", user: USER_EMAIL, gtin }, fields))
    });
    return true;
  } catch { return false; }
}

async function fetchProduct(gtin) {
  try {
    const r = await fetch(`${API_BASE}/card?code=${encodeURIComponent(gtin)}`);
    return r.ok ? await r.json() : null;
  } catch { return null; }
}

async function load() {
  if (!USER_EMAIL) {
    out.innerHTML = `<div class="msg"><b>Sign in to see your collection</b>Your scanned products live here.</div>`;
    return;
  }

  let scans = [];
  try {
    const r = await fetch(`${READ_URL}?type=palate&user=${encodeURIComponent(USER_EMAIL)}`);
    const data = await r.json();
    scans = Array.isArray(data.scans) ? data.scans : [];
    Object.assign(RATINGS, data.ratings || {});
  } catch {
    out.innerHTML = `<div class="msg"><b>Couldn't load your collection</b>Check your connection and pull down to refresh.</div>`;
    return;
  }

  // newest scan of each product wins
  const byGtin = new Map();
  scans.reverse().forEach(s => { if (s.gtin && !byGtin.has(s.gtin)) byGtin.set(s.gtin, s); });
  const list = [...byGtin.values()];

  if (!list.length) {
    out.innerHTML = `<div class="msg"><b>Your collection is empty</b>Scan a product's barcode to add your first card.</div>`;
    return;
  }

  countEl.textContent = list.length + (list.length === 1 ? " card" : " cards");

  // pull current product detail (TRIAX, logo) for each scanned code
  const products = await Promise.all(list.map(s => fetchProduct(s.gtin)));

  const html = list.map((scan, i) => {
    const fetched = products[i];
    // fall back to the snapshot stored in the Sheet if the catalog misses it
    const p = fetched || {
      name: scan.name, brand: scan.brand, category: scan.category,
      species: scan.species, size: scan.size, thc: scan.thc, cbd: scan.cbd,
      terpenes: [scan.terp1, scan.terp2, scan.terp3].filter(Boolean),
      description: scan.description, sku: ""
    };
    return cardHTML(p, scan, i);
  }).join("\n");

  out.innerHTML = `<div class="grid">${html}</div>`;
  hintEl.textContent = "Tap a card to open";

  // tag each thumbnail with its gtin, remember its data, paint its rating
  [...out.querySelectorAll(".grid .scene")].forEach((scene, i) => {
    const scan = list[i];
    const prod = products[i] || {
      name: scan.name, brand: scan.brand, category: scan.category,
      species: scan.species, size: scan.size, thc: scan.thc, cbd: scan.cbd,
      terpenes: [scan.terp1, scan.terp2, scan.terp3].filter(Boolean),
      description: scan.description, sku: ""
    };
    scene.dataset.gtin = scan.gtin || "";
    PRODUCTS[scan.gtin] = { p: prod, scan };
    paintThumbStars(scan.gtin);
  });

  [...out.querySelectorAll(".scene")].forEach((scene, i) => {
    const scan = list[i];
    const p = products[i] || {
      name: scan.name, brand: scan.brand, category: scan.category,
      species: scan.species, size: scan.size, thc: scan.thc, cbd: scan.cbd,
      terpenes: [scan.terp1, scan.terp2, scan.terp3].filter(Boolean),
      description: scan.description, sku: ""
    };
    const card = scene.querySelector(".card");
    const open = () => openViewer(p, scan);
    card.addEventListener("click", open);
    card.addEventListener("keydown", e => {
      if (e.key === " " || e.key === "Enter") { e.preventDefault(); open(); }
    });
    card.setAttribute("aria-label", `Open ${p.name || "card"}`);
  });
}

load();
</script>
<!-- ===== DELETE A CARD (added feature) =====
     Adds a Delete button to the open card viewer. Confirms, tells the
     Google Sheet to drop this user+product (via the Apps Script "delete"
     route), then removes the card from the grid and closes the viewer.
     Self-contained: uses only existing IDs/classes in this page. -->
<script>
(function () {
  var WRITE_URL  = "https://script.google.com/macros/s/AKfycbwDB49IjpEutdT-XH8bXX-Y2Eq6uBRqxN4Dl1Trcmg6otbfv9pPkm8ZnEBHDjxzXSt4/exec";
  var USER_EMAIL = new URLSearchParams(location.search).get("user") || "";

  var viewer = document.getElementById("viewer");
  var vstage = document.getElementById("vstage");
  if (!viewer || !vstage) return;

  /* Delete button — pinned to the bottom of the viewer while a card is open. */
  var btn = document.createElement("button");
  btn.type = "button";
  btn.id = "vdelete";
  btn.textContent = "Delete this card";
  var css = {
    position: "fixed", left: "50%", bottom: "22px", transform: "translateX(-50%)",
    display: "none", padding: "12px 22px",
    background: "#fff", color: "#C0392B",
    border: "1.5px solid #E4B4AE", borderRadius: "12px",
    fontFamily: "'DM Sans',system-ui,sans-serif", fontWeight: "700",
    fontSize: ".95rem", cursor: "pointer", zIndex: "10",
    boxShadow: "0 8px 24px -8px rgba(0,0,0,.35)", WebkitTapHighlightColor: "transparent"
  };
  for (var k in css) btn.style[k] = css[k];
  viewer.appendChild(btn);

  function currentGtin() {
    var r = vstage.querySelector(".rating[data-gtin]");
    return r ? r.dataset.gtin : "";
  }
  function reset() {
    btn.disabled = false;
    btn.textContent = "Delete this card";
  }
  function sync() {
    var open = viewer.classList.contains("open");
    btn.style.display = (open && currentGtin()) ? "block" : "none";
    reset();
  }
  new MutationObserver(sync).observe(viewer, { attributes: true, attributeFilter: ["class"] });
  new MutationObserver(sync).observe(vstage, { childList: true });
  sync();

  function esc(g) {
    return (window.CSS && CSS.escape) ? CSS.escape(g) : String(g).replace(/["\\]/g, "\\$&");
  }
  function updateCount() {
    var countEl = document.getElementById("count");
    var n = document.querySelectorAll(".grid .scene").length;
    if (countEl) countEl.textContent = n + (n === 1 ? " card" : " cards");
    if (n === 0) {
      var out = document.getElementById("out");
      if (out) out.innerHTML = '<div class="msg"><b>Your collection is empty</b>Scan a product’s barcode to add your first card.</div>';
      var hint = document.getElementById("hint");
      if (hint) hint.textContent = "";
    }
  }
  function closeIt() {
    if (typeof closeViewer === "function") { try { closeViewer(); return; } catch (e) {} }
    viewer.classList.remove("open");
    viewer.setAttribute("aria-hidden", "true");
    vstage.innerHTML = "";
    document.body.style.overflow = "";
  }

  btn.addEventListener("click", function () {
    var gtin = currentGtin();
    if (!gtin) return;
    if (!confirm("Delete this card from your collection? This cannot be undone.")) return;
    btn.disabled = true;
    btn.textContent = "Deleting…";

    /* Tell the sheet to drop this user+product. no-cors = fire-and-forget. */
    try {
      fetch(WRITE_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ type: "delete", user: USER_EMAIL, gtin: gtin, at: new Date().toISOString() })
      });
    } catch (e) {}

    /* Update the UI immediately so it feels instant. */
    var scene = document.querySelector('.grid .scene[data-gtin="' + esc(gtin) + '"]');
    if (scene) scene.remove();
    try { if (typeof PRODUCTS !== "undefined") delete PRODUCTS[gtin]; } catch (e) {}
    try { if (typeof RATINGS  !== "undefined") delete RATINGS[gtin]; } catch (e) {}

    closeIt();
    updateCount();
    reset();
  });
})();
</script>
