<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>My Collection · The Terpene Sommelier</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent}
  body{font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;color:#1B2430}
  .wrap{max-width:1100px;margin:0 auto;padding:10px 12px 30px}

  .bar{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:2px 2px 12px;
  }
  .bar .count{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:.64rem;
    letter-spacing:.16em;text-transform:uppercase;color:#8B959F;
  }
  .bar .hint{font-size:.66rem;color:#9AA3AC}

  .msg{
    text-align:center;color:#8B959F;font-size:.9rem;line-height:1.8;
    padding:50px 20px;
  }
  .msg b{color:#1B2430;display:block;margin-bottom:6px;font-size:1rem}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));
    gap:20px;
  }
  @media(min-width:680px){.grid{grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:24px}}

  /* ══ CARD SHELL ══ */
  .scene{width:100%;aspect-ratio:5/7;perspective:1500px}
  .card{
    position:relative;width:100%;height:100%;transform-style:preserve-3d;
    transition:transform .75s cubic-bezier(.2,.75,.2,1);cursor:pointer;
  }
  .card.flipped{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;
    border-radius:9px;box-shadow:0 14px 34px -10px rgba(0,0,0,.32);
  }
  .back{transform:rotateY(180deg)}
  /* only the visible face may take clicks, or taps on back-face inputs
     fall through to the invisible front and trigger a flip */
  .front{pointer-events:auto}
  .back{pointer-events:none}
  .card.flipped .front{pointer-events:none}
  .card.flipped .back{pointer-events:auto}
  .card:focus-visible{outline:3px solid var(--deep);outline-offset:5px;border-radius:12px}

  /* ══ FRONT ══ */
  .front{background:var(--border);padding:8px;display:flex}
  .stage{
    flex:1;position:relative;overflow:hidden;border-radius:2px;
    background:#fff;display:flex;flex-direction:column;
  }
  .hero{
    flex:1;position:relative;overflow:hidden;background:#fff;
    display:flex;align-items:center;justify-content:center;
  }
  .hero .leaf{
    position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);
    width:96%;opacity:.13;
  }
  .hero .leaf svg{width:100%;height:auto;display:block}
  .hero .mark{position:relative;z-index:3;text-align:center;padding:0 14px}
  .hero .mark .logo-badge{
    display:inline-flex;align-items:center;justify-content:center;
    background:#fff;border-radius:11px;border:1px solid #E4E8EB;
    padding:12px 18px;max-width:86%;min-height:52px;
    box-shadow:0 5px 14px rgba(27,36,48,.13);
  }
  .hero .mark .logo-badge img{max-width:100%;max-height:58px;object-fit:contain;display:block}
  .hero .mark .logo-badge .wm{
    font-family:'Playfair Display',serif;font-weight:800;font-size:.94rem;
    line-height:1.1;color:#22303C;
  }
  .hero .mark .sz{
    font-family:'Oswald',sans-serif;font-weight:500;font-size:.46rem;
    letter-spacing:.2em;text-transform:uppercase;color:#8B959F;margin-top:8px;
  }
  .cardno{
    position:absolute;top:7px;right:8px;z-index:4;
    font-family:'Oswald',sans-serif;font-weight:700;font-size:.42rem;
    color:var(--deep);letter-spacing:.03em;white-space:nowrap;
  }
  .canna{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .stage .canna{padding:0 9px;margin:7px 0 0}
  .canna .b{
    border-radius:3px;padding:6px 5px;text-align:center;
    border:2px solid #fff;box-shadow:0 1px 4px rgba(27,36,48,.16);
  }
  .canna .thc{background:var(--c-thc)}
  .canna .cbd{background:var(--c-cbd)}
  .canna .b .k{
    font-family:'Oswald',sans-serif;font-weight:700;font-size:.46rem;
    letter-spacing:.13em;text-transform:uppercase;color:#1B2430;opacity:.75;
  }
  .canna .b .v{font-family:'Anton',sans-serif;font-size:.78rem;margin-top:1px;color:#1B2430}
  .plate{
    position:relative;background:#fff;padding:10px 10px 11px;
    display:flex;align-items:center;gap:9px;overflow:hidden;
    border-top:3px solid var(--border);
  }
  .plate .burst{
    position:absolute;left:34%;top:50%;transform:translate(-50%,-50%);
    width:230%;aspect-ratio:1;
    background:repeating-conic-gradient(from 0deg at 50% 50%,
      rgba(35,50,64,.055) 0deg 4deg, transparent 4deg 10deg);
  }
  .plate .crest{
    position:relative;z-index:2;flex:0 0 auto;
    width:46px;height:46px;border-radius:50%;
    background:#fff;border:3px solid var(--border);
    box-shadow:0 2px 6px rgba(0,0,0,.15);
    display:flex;align-items:center;justify-content:center;overflow:hidden;padding:4px;
  }
  .plate .crest img{width:100%;height:100%;object-fit:contain}
  .plate .crest .ini{font-family:'Anton',sans-serif;font-size:.9rem;color:var(--deep);line-height:1}
  .plate .txt{position:relative;z-index:2;min-width:0}
  .plate .txt .nm{
    font-family:'Anton',sans-serif;font-size:.94rem;color:#1B2430;
    line-height:1;text-transform:uppercase;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  }
  .plate .txt .pos{
    font-family:'Oswald',sans-serif;font-weight:500;font-size:.54rem;
    letter-spacing:.16em;text-transform:uppercase;color:var(--deep);margin-top:3px;
  }

  /* ══ BACK ══ */
  .back{background:var(--border);padding:8px;display:flex}
  .sheet{
    flex:1;background:#fff;border-radius:2px;padding:11px 11px 10px;
    display:flex;flex-direction:column;color:#1B2430;overflow-y:auto;
  }
  .bh{
    display:flex;justify-content:space-between;align-items:flex-start;
    border-bottom:3px solid var(--border);padding-bottom:6px;gap:7px;
  }
  .bh .n{font-family:'Anton',sans-serif;font-size:.84rem;line-height:1;text-transform:uppercase}
  .bh .n small{
    display:block;font-family:'DM Sans',sans-serif;font-weight:500;
    text-transform:none;font-size:.52rem;color:#75808C;margin-top:3px;
  }
  .bh .no{font-family:'Anton',sans-serif;font-size:.58rem;color:var(--deep);flex:0 0 auto;white-space:nowrap}
  .h3{
    margin-top:8px;font-family:'Oswald',sans-serif;font-weight:600;
    font-size:.44rem;letter-spacing:.16em;text-transform:uppercase;color:#8B959F;
    border-bottom:1px solid #E4E8EB;padding-bottom:3px;
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .h3 em{
    font-style:normal;font-family:'DM Sans',sans-serif;font-weight:700;
    font-size:.44rem;letter-spacing:.02em;text-transform:none;color:var(--deep);
  }
  .tr{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid #EDF0F2}
  .tr .r{
    width:15px;height:15px;border-radius:50%;background:var(--border);color:#fff;
    font-family:'Oswald',sans-serif;font-weight:700;font-size:.46rem;
    display:flex;align-items:center;justify-content:center;flex:0 0 auto;
  }
  .tr .t{font-weight:700;font-size:.66rem}
  .tr .tn{
    font-weight:700;font-size:.6rem;font-family:'DM Sans',sans-serif;color:#1B2430;
    border:1px solid #D4D9DD;border-radius:3px;padding:2px 3px;max-width:112px;
    display:none;background:#fff;
  }
  .tr .x{
    margin-left:auto;font-family:'Oswald',sans-serif;font-size:.44rem;
    letter-spacing:.1em;text-transform:uppercase;color:#9AA3AC;
  }
  .tr .tp{
    margin-left:auto;width:42px;padding:2px 4px;font-size:.58rem;
    border:1px solid #D4D9DD;border-radius:3px;text-align:right;
    font-family:'DM Sans',sans-serif;color:#1B2430;display:none;
  }
  .sheet.editing .tr .t{display:none}
  .sheet.editing .tr .tn{display:inline-block}
  .sheet.editing .tr .x{display:none}
  .sheet.editing .tr .tp{display:inline-block}

  /* ══ TRIAX ══ */
  .triax{margin-top:6px}
  .triax .m{margin-top:6px}
  .triax .m:first-child{margin-top:4px}
  .triax .hd{display:flex;justify-content:space-between;align-items:baseline}
  .triax .hd .k{font-family:'DM Sans',sans-serif;font-weight:700;font-size:.58rem}
  .triax .hd .v{font-family:'Anton',sans-serif;font-size:.76rem;line-height:1;transition:color .3s}
  .triax .track{
    position:relative;height:6px;border-radius:4px;background:#ECEEF0;
    margin-top:3px;overflow:hidden;
  }
  .triax .track::after{
    content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(27,36,48,.14);
  }
  .triax .fill{
    position:absolute;left:0;top:0;bottom:0;border-radius:4px;
    transition:width .6s cubic-bezier(.2,.8,.2,1),background-color .4s;
  }
  .triax .fill.ind{background:#4285F4}
  .triax .fill.sat{background:#F58A34}
  .triax .fill.hyb{background:#2FB457}
  .triax .sc{
    display:flex;justify-content:space-between;align-items:baseline;margin-top:2px;
    font-family:'Oswald',sans-serif;font-size:.38rem;color:#B4BCC4;letter-spacing:.06em;
  }
  .triax .sc .d{
    font-family:'DM Sans',sans-serif;font-weight:700;font-size:.46rem;
    color:#5C6771;letter-spacing:0;text-align:center;flex:1;
  }
  .triax .key{
    display:flex;justify-content:center;gap:8px;margin-top:7px;
    font-family:'DM Sans',sans-serif;font-size:.4rem;color:#75808C;
  }
  .triax .key span{display:flex;align-items:center;gap:3px}
  .triax .key i{width:5px;height:5px;border-radius:50%;display:block}

  .triax-toggle{
    font-family:'DM Sans',sans-serif;font-weight:700;font-size:.46rem;
    color:var(--deep);background:none;border:none;cursor:pointer;padding:0;margin-top:5px;
  }
  .triax-toggle:hover{text-decoration:underline}
  .triax-editbar{
    display:none;margin-top:5px;gap:5px;flex-wrap:wrap;align-items:center;
    background:#F6F8F9;border:1px solid #E4E8EB;border-radius:5px;padding:6px;
  }
  .sheet.editing .triax-editbar{display:flex}
  .triax-editbar label{
    display:flex;flex-direction:column;gap:1px;
    font-family:'Oswald',sans-serif;font-size:.36rem;letter-spacing:.08em;
    text-transform:uppercase;color:#8B959F;font-weight:600;
  }
  .triax-editbar input{
    width:42px;padding:2px 4px;font-size:.58rem;border:1px solid #D4D9DD;
    border-radius:3px;font-family:'DM Sans',sans-serif;
  }
  .triax-editbar .hint{
    flex-basis:100%;font-size:.4rem;color:#9AA3AC;line-height:1.4;margin-top:2px;
  }
  .triax-actions{margin-top:5px;display:none;gap:5px}
  .sheet.editing .triax-actions{display:flex}
  .triax-reset{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:.42rem;
    letter-spacing:.08em;text-transform:uppercase;border-radius:3px;
    padding:4px 8px;cursor:pointer;background:none;color:#8B959F;border:1px solid #D4D9DD;
  }
  .triax-badge{
    display:none;margin-top:5px;font-weight:700;font-size:.4rem;color:var(--deep);
    background:#F2F7FA;border-radius:3px;padding:3px 6px;
  }
  .sheet.recalculated .triax-badge{display:block}

  .facts{margin-top:8px;display:flex;gap:4px}
  .facts div{flex:1;background:#F2F5F7;border-radius:3px;padding:4px 5px;text-align:center}
  .facts .k{
    font-family:'Oswald',sans-serif;font-size:.38rem;letter-spacing:.1em;
    text-transform:uppercase;color:#8B959F;font-weight:600;
  }
  .facts .v{font-family:'Oswald',sans-serif;font-weight:600;font-size:.56rem;margin-top:1px}
  .bf{
    margin-top:auto;padding-top:8px;border-top:1px solid #E4E8EB;
    display:flex;justify-content:space-between;align-items:flex-end;
  }
  .bf .l{
    font-family:'Oswald',sans-serif;font-size:.38rem;letter-spacing:.08em;
    text-transform:uppercase;color:#9AA3AC;line-height:1.5;
  }
  .bf .mk{font-family:'Playfair Display',serif;font-weight:700;font-size:.54rem}
  .bf .mk b{color:var(--deep)}

  /* ══ SPECIES ══ */
  .indica{--border:#74C6EA;--deep:#2F7FA3;--c-thc:#97D6EF;--c-cbd:#ACDFF2}
  .sativa{--border:#F58A34;--deep:#B85F16;--c-thc:#F7A45D;--c-cbd:#F8B670}
  .hybrid{--border:#5AA06E;--deep:#33704A;--c-thc:#7CB88F;--c-cbd:#9DCBAA}
</style>
</head>

</div>

  {a:"Limonene",b:"Citronellol",cerebral:.5,somatic:0}

};

/* ── the engine: faithful port of the Calculator sheet ── */
function buildTriaxEngine(DATA){
  const db={}; DATA.database.forEach(r=>db[r.name]=r);
  const look=n=>db[n]||{name:n,cerebral:0,somatic:0,threshold:0,volatility:0,density:0,clarity:0,aroma:""};
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  const xlRound=v=>v>=0?Math.floor(v+.5):Math.ceil(v-.5);

  const CER=["deeply suppressed","dulled","mildly clouded","soft","quiet","clear","gently lifted","alert","stimulating","sharp","electric"];
  const SOM=["narcotic, immobilizing","heavy, sedating","deeply relaxed","relaxed","grounded","neutral","subtle body lift","light, mobile","energizing","very energizing","activating"];
  const OVR=["Narcotic Gravity","Tranquilizing","Sedative","Heavy Hybrid","Grounded / Calm","Balanced","Bright / Light Uplift","Upbeat Hybrid","Functional Stimulating","High Velocity","Electric Cerebral"];
  const lbl=(arr,s)=>arr[clamp(s,-5,5)+5];
  const title=s=>s.replace(/(^|,\s*)([a-z])/g,(m,sep,ch)=>sep+ch.toUpperCase());

  function calculate(i){
    const t1=i.t1,t2=i.t2,t3=i.t3||"(none)";
    const p1=+i.p1||0,p2=+i.p2||0,p3=+i.p3||0;
    const thc=+i.thc||0,cbd=+i.cbd||0,tt=+i.totalTerp||0;
    const species=i.species||"Hybrid";
    const d1=look(t1),d2=look(t2),d3=look(t3);
    const sum=p1+p2+p3;

    // 1 · base vector
    let bC,bS;
    if(sum>0){
      const a1=p1>=d1.threshold,a2=p2>=d2.threshold,a3=p3>=d3.threshold;
      bC=(a1?d1.cerebral:0)*(p1/sum)+(a2?d2.cerebral:0)*(p2/sum)+(a3?d3.cerebral:0)*(p3/sum);
      bS=(a1?d1.somatic:0)*(p1/sum)+(a2?d2.somatic:0)*(p2/sum)+(a3?d3.somatic:0)*(p3/sum);
    } else {
      bC=(d1.cerebral+d2.cerebral+d3.cerebral)/3;
      bS=(d1.somatic+d2.somatic+d3.somatic)/3;
    }
    // 2 · synergy
    const sel=new Set([t1,t2,t3]); let sC=0,sS=0;
    DATA.synergies.forEach(r=>{ if(sel.has(r.a)&&sel.has(r.b)){sC+=r.cerebral;sS+=r.somatic;} });
    // 3 · conflict
    const cv=[d1.cerebral,d2.cerebral,d3.cerebral], sv=[d1.somatic,d2.somatic,d3.somatic];
    const kC=(Math.max(...cv)>=4&&Math.min(...cv)<=-4)?-1:0;
    const kS=(Math.max(...sv)>=4&&Math.min(...sv)<=-4)?-1:0;
    // 4-6 · volatility, density, clarity
    const vC=d1.volatility+d2.volatility+d3.volatility;
    const dS=-(d1.density+d2.density+d3.density);
    const lC=d1.clarity+d2.clarity+d3.clarity;
    // 7 · raw
    const cRaw=bC+sC+kC+vC+lC, sRaw=bS+sS+kS+dS;
    const oRaw=(Math.abs(cRaw)+Math.abs(sRaw))===0?0:
      (Math.abs(cRaw)*cRaw+Math.abs(sRaw)*sRaw)/(Math.abs(cRaw)+Math.abs(sRaw));
    // modulators
    const load=clamp(.5+(tt/1.5)*.5,.5,1.5);
    const amp=clamp(1+((thc-20)/20)*.4,.6,1.4);
    const damp=thc===0?1:Math.max(.6,1-Math.min(1,cbd/thc)*.4);
    // 8 · final
    let cF=clamp(xlRound(cRaw*load*amp*damp),-5,5)||0;
    let sF=clamp(xlRound(sRaw*load*amp*damp),-5,5)||0;
    let oF=clamp(xlRound(oRaw*load*amp*damp),-5,5)||0;
    // species nudge: +1 cerebral for Sativa, -1 somatic for Indica
    const nC=species==="Sativa"?1:0, nS=species==="Indica"?-1:0;
    if(nC||nS){
      cF=clamp(cF+nC,-5,5)||0; sF=clamp(sF+nS,-5,5)||0;
      const den=Math.abs(cF)+Math.abs(sF);
      oF=clamp(xlRound(den===0?0:(Math.abs(cF)*cF+Math.abs(sF)*sF)/den),-5,5)||0;
    }
    return {
      cerFinal:cF, somFinal:sF, overallFinal:oF,
      cerLabel:title(lbl(CER,cF)), somLabel:title(lbl(SOM,sF)), overallLabel:lbl(OVR,oF)
    };
  }
  return {calculate,look};
}
const ENGINE = buildTriaxEngine(TRIAX_DATA);
</script>

/* ── species → card palette ── */
function speciesClass(p) {
  const s = (p.species || p.klass || "").toUpperCase();
  if (s.includes("INDICA")) return "indica";
  if (s.includes("SATIVA")) return "sativa";

}
function speciesName(p) {
  const c = speciesClass(p);

const fillClass = s => s <= -2 ? "ind" : s >= 2 ? "sat" : "hyb";
const leanLabel = s => s <= -2 ? "Indica Leaning" : s >= 2 ? "Sativa Leaning" : "Hybrid Leaning";
const widthPct  = s => Math.max(6, ((s + 5) / 10) * 100);

const dbNames = new Set(TRIAX_DATA.database.map(r => r.name));

};
function resolveTerp(raw) {
  if (!raw) return "(none)";
  if (dbNames.has(raw)) return raw;
  if (ALIASES[raw]) return ALIASES[raw];

function initials(brand) {

function midpoint(range) {

  if (!n) return 22;
  return n.length === 1 ? parseFloat(n[0]) : (parseFloat(n[0]) + parseFloat(n[1])) / 2;
}

/* ══ CARD TEMPLATE ══ */

  const terpRows = terps.length ? terps.map((t, i) => {

    return `      <div class="tr" data-terp="${esc(r)}">

/* ══ LIVE RECALCULATION ══ */
function wireCard(scene, p) {
  const card = scene.querySelector(".card");
  const sheet = scene.querySelector(".sheet");

  // flip — but never when the tap lands on a control
  const isCtrl = e => e.target.closest("select,input,button,.triax-editbar,.triax-actions");
  card.addEventListener("click", e => { if (!isCtrl(e)) card.classList.toggle("flipped"); });
  card.addEventListener("keydown", e => {
    if ((e.key === " " || e.key === "Enter") && !isCtrl(e)) { e.preventDefault(); card.classList.toggle("flipped"); }
  });

  const triax = sheet.querySelector(".triax");
  if (!triax) return;                       // no TRIAX for this product

  const toggle = sheet.querySelector(".triax-toggle");
  const resetBtn = sheet.querySelector(".triax-reset");
  const thcIn = sheet.querySelector(".in-thc");
  const cbdIn = sheet.querySelector(".in-cbd");
  const ttIn  = sheet.querySelector(".in-tt");
  const rows  = [...sheet.querySelectorAll(".tr[data-terp]")];
  const leanEl = sheet.querySelector(".h3 em.lean");

  const thcDefault = midpoint(p.thc);
  const NEUTRAL_TT = 1.5;
  const species = speciesName(p);

  // the as-reported baseline, straight from the main app
  const base = {
    lean: leanEl.textContent,
    axes: {},
    terps: rows.map(r => ({ label: r.querySelector(".t").textContent, resolved: r.dataset.terp }))
  };
  ["cer", "som", "over"].forEach(a => {
    const m = triax.querySelector(`.m[data-axis="${a}"]`);
    base.axes[a] = {
      score: parseInt(m.querySelector(".hd .v").textContent, 10),
      desc: m.querySelector(".sc .d").textContent
    };
  });

  rows.forEach((row, i) => {
    const sel = row.querySelector(".tn");
    TERP_LIST.forEach(n => sel.add(new Option(n, n)));
    sel.value = base.terps[i].resolved;
  });

  const applyAxis = (a, score, desc) => {
    const m = triax.querySelector(`.m[data-axis="${a}"]`);
    m.querySelector(".hd .v").textContent = (score > 0 ? "+" : "") + score;
    const f = m.querySelector(".fill");
    f.style.width = widthPct(score) + "%";
    f.classList.remove("ind", "sat", "hyb");
    f.classList.add(fillClass(score));
    m.querySelector(".sc .d").textContent = desc;
  };

  const untouched = () =>
    rows.every((r, i) => r.querySelector(".tn").value === base.terps[i].resolved) &&
    rows.every(r => !r.querySelector(".tp").value.trim()) &&
    !thcIn.value.trim() && !cbdIn.value.trim() && !ttIn.value.trim();

  function showBaseline() {
    applyAxis("cer",  base.axes.cer.score,  base.axes.cer.desc);
    applyAxis("som",  base.axes.som.score,  base.axes.som.desc);
    applyAxis("over", base.axes.over.score, base.axes.over.desc);
    leanEl.textContent = base.lean;
    rows.forEach((r, i) => {
      r.dataset.terp = base.terps[i].resolved;
      r.querySelector(".t").textContent = base.terps[i].label;
      r.querySelector(".tn").value = base.terps[i].resolved;
    });
    sheet.classList.remove("recalculated");
  }

  function recalc() {
    if (untouched()) { showBaseline(); return; }

    const t = rows.map(r => r.querySelector(".tn").value);
    const pc = rows.map(r => parseFloat(r.querySelector(".tp").value) || 0);
    const thc = thcIn.value.trim() ? (parseFloat(thcIn.value) || 0) : thcDefault;
    const cbd = parseFloat(cbdIn.value) || 0;
    const entered = pc.reduce((a, b) => a + b, 0);
    const tt = ttIn.value.trim() ? (parseFloat(ttIn.value) || 0)
             : entered > 0 ? entered : NEUTRAL_TT;

    const r = ENGINE.calculate({
      t1: t[0], p1: pc[0], t2: t[1] || "(none)", p2: pc[1] || 0,
      t3: t[2] || "(none)", p3: pc[2] || 0,
      thc, cbd, totalTerp: tt, species
    });

    applyAxis("cer",  r.cerFinal,     r.cerLabel);
    applyAxis("som",  r.somFinal,     r.somLabel);
    applyAxis("over", r.overallFinal, r.overallLabel);
    leanEl.textContent = leanLabel(r.overallFinal);

    t.forEach((name, i) => {
      rows[i].dataset.terp = name;
      rows[i].querySelector(".t").textContent = name;
      rows[i].querySelector(".x").textContent = AROMA_NOTE[name] || "";
    });
    sheet.classList.add("recalculated");
  }

  toggle.addEventListener("click", () => {
    sheet.classList.add("editing");
    toggle.style.display = "none";
  });
  resetBtn.addEventListener("click", () => {
    sheet.classList.remove("editing");
    toggle.style.display = "inline-block";
    thcIn.value = cbdIn.value = ttIn.value = "";
    rows.forEach(r => r.querySelector(".tp").value = "");
    showBaseline();
  });

  rows.forEach(r => {
    r.querySelector(".tn").addEventListener("change", recalc);
    r.querySelector(".tp").addEventListener("input", recalc);
  });
  [thcIn, cbdIn, ttIn].forEach(i => i.addEventListener("input", recalc));
}

/* ══ LOAD ══ */
async function fetchProduct(gtin) {
  try {
    const r = await fetch(`${API_BASE}/card?code=${encodeURIComponent(gtin)}`);
    return r.ok ? await r.json() : null;
  } catch { return null; }
}

async function load() {
  if (!USER_EMAIL) {
    out.innerHTML = `<div class="msg"><b>Sign in to see your collection</b>Your scanned products live here.</div>`;
    return;
  }

  let scans = [];
  try {
    const r = await fetch(`${READ_URL}?user=${encodeURIComponent(USER_EMAIL)}`);
    scans = await r.json();
    if (!Array.isArray(scans)) scans = [];
  } catch {
    out.innerHTML = `<div class="msg"><b>Couldn't load your collection</b>Check your connection and pull down to refresh.</div>`;
    return;
  }

  // newest scan of each product wins
  const byGtin = new Map();
  scans.reverse().forEach(s => { if (s.gtin && !byGtin.has(s.gtin)) byGtin.set(s.gtin, s); });
  const list = [...byGtin.values()];

  if (!list.length) {
    out.innerHTML = `<div class="msg"><b>Your collection is empty</b>Scan a product's barcode to add your first card.</div>`;
    return;
  }

  countEl.textContent = list.length + (list.length === 1 ? " card" : " cards");

  // pull current product detail (TRIAX, logo) for each scanned code
  const products = await Promise.all(list.map(s => fetchProduct(s.gtin)));

  const html = list.map((scan, i) => {
    const fetched = products[i];
    // fall back to the snapshot stored in the Sheet if the catalog misses it
    const p = fetched || {
      name: scan.name, brand: scan.brand, category: scan.category,
      species: scan.species, size: scan.size, thc: scan.thc, cbd: scan.cbd,
      terpenes: [scan.terp1, scan.terp2, scan.terp3].filter(Boolean),
      description: scan.description, sku: ""
    };
    return cardHTML(p, scan, i);
  }).join("\n");

  out.innerHTML = `<div class="grid">${html}</div>`;
  hintEl.textContent = "Tap a card to flip";

  [...out.querySelectorAll(".scene")].forEach((scene, i) => {
    const fetched = products[i];
    const p = fetched || { thc: list[i].thc, species: list[i].species };
    wireCard(scene, p);
  });
}

load();
</script>
