<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Your Palate · The Terpene Sommelier</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:transparent}
  :root{
    --ink:#171C26;          /* near-black text, high contrast */
    --ink-2:#3A424F;        /* secondary text, still dark */
    --muted:#6A7280;        /* captions only */
    --line:#E4E8EC;
    --paper:#FFFFFF;
    --shell:#F5F7F9;
    --fav:#1F9D57;          /* deeper green than the bar green */
    --fav-bg:#E7F6EE;
    --avoid:#D14338;
    --avoid-bg:#FBEAE8;
    --gold:#E0A100;
    --indica:#3E8FB5; --sativa:#C56A1E; --hybrid:#42815A;
  }
  body{
    font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    color:var(--ink);line-height:1.5;
  }
  .wrap{max-width:660px;margin:0 auto;padding:18px 15px 48px}

  /* ── header ── */
  .head{margin-bottom:16px}
  .eyebrow{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:.66rem;
    letter-spacing:.24em;text-transform:uppercase;color:var(--muted);
  }
  .head h1{
    font-family:'Playfair Display',serif;font-weight:800;font-size:1.7rem;
    color:var(--ink);line-height:1.05;margin-top:3px;letter-spacing:-.01em;
  }

  /* ── headline card: the thesis ── */
  .thesis{
    background:var(--ink);color:#fff;border-radius:16px;
    padding:18px 18px 16px;margin:16px 0 22px;
    box-shadow:0 12px 30px -14px rgba(23,28,38,.6);
  }
  .thesis .line{font-size:1rem;line-height:1.55;color:#EDEFF2;font-weight:500}
  .thesis .line b{color:#fff;font-weight:700}
  .thesis .stats{
    display:flex;gap:0;margin-top:16px;padding-top:15px;
    border-top:1px solid rgba(255,255,255,.14);
  }
  .thesis .stats div{flex:1;text-align:center;position:relative}
  .thesis .stats div + div::before{
    content:"";position:absolute;left:0;top:2px;bottom:2px;width:1px;
    background:rgba(255,255,255,.14);
  }
  .thesis .stats .num{
    font-family:'Playfair Display',serif;font-weight:800;font-size:1.5rem;color:#fff;line-height:1;
  }
  .thesis .stats .lbl{
    font-family:'Oswald',sans-serif;font-size:.56rem;letter-spacing:.14em;
    text-transform:uppercase;color:rgba(255,255,255,.6);margin-top:5px;
  }

  /* ── sections ── */
  .section{margin-bottom:22px}
  .section > .shead{display:flex;align-items:center;gap:9px;margin-bottom:3px}
  .section > .shead .tag{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:.7rem;
    letter-spacing:.16em;text-transform:uppercase;padding:4px 9px;border-radius:6px;
  }
  .section.fav .tag{color:#0F6A38;background:var(--fav-bg)}
  .section.avoid .tag{color:#9E2C23;background:var(--avoid-bg)}
  .section > .shead .count{
    font-family:'Oswald',sans-serif;font-size:.66rem;color:var(--muted);letter-spacing:.06em;
  }
  .section > .sub{font-size:.8rem;color:var(--ink-2);margin-bottom:11px}

  /* ── terpene row as a card ── */
  .terp{
    display:flex;align-items:center;gap:12px;
    background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:12px 14px;margin-bottom:8px;
    transition:transform .15s,box-shadow .15s;
  }
  .terp:hover{transform:translateY(-1px);box-shadow:0 8px 20px -12px rgba(23,28,38,.28)}
  .terp .rank{
    font-family:'Playfair Display',serif;font-weight:800;font-size:1.15rem;
    color:var(--ink);width:22px;flex:0 0 auto;text-align:center;opacity:.32;
  }
  .terp .body{flex:1;min-width:0}
  .terp .name{
    font-family:'DM Sans',sans-serif;font-weight:700;font-size:1rem;
    color:var(--ink);display:flex;align-items:baseline;gap:8px;
  }
  .terp .name .aroma{
    font-family:'Oswald',sans-serif;font-weight:500;font-size:.58rem;
    letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
    padding:2px 7px;background:var(--shell);border-radius:20px;
  }
  .terp .meter{
    position:relative;height:7px;border-radius:5px;background:#EEF1F3;
    margin-top:8px;overflow:hidden;
  }
  .terp .meter::after{
    content:"";position:absolute;left:50%;top:0;bottom:0;width:1.5px;background:rgba(23,28,38,.16);
  }
  .terp .meter .fill{position:absolute;top:0;bottom:0;border-radius:5px;transition:width .55s ease,left .55s ease}
  .fav .terp .meter .fill{background:linear-gradient(90deg,#37B26E,var(--fav))}
  .avoid .terp .meter .fill{background:linear-gradient(90deg,var(--avoid),#E86A60)}
  .terp .side{flex:0 0 auto;text-align:right;min-width:70px}
  .terp .side .stars{font-size:.88rem;letter-spacing:1px;line-height:1}
  .terp .side .stars .on{color:var(--gold)}
  .terp .side .stars .off{color:#D6DBE0}
  .terp .side .n{
    font-family:'Oswald',sans-serif;font-size:.6rem;color:var(--muted);
    margin-top:4px;letter-spacing:.04em;
  }
  .terp .side .n.new{color:var(--sativa);font-weight:600}

  /* ── empty / loading / legend ── */
  .msg{text-align:center;color:var(--ink-2);font-size:.95rem;line-height:1.8;padding:52px 22px}
  .msg b{color:var(--ink);display:block;margin-bottom:7px;font-size:1.05rem;font-family:'Playfair Display',serif}
  .legend{
    font-size:.74rem;color:var(--ink-2);line-height:1.7;margin-top:10px;
    padding:14px 15px;background:var(--shell);border-radius:12px;
  }
  .legend b{color:var(--ink)}

  @media (prefers-reduced-motion: reduce){
    .terp,.terp .meter .fill{transition:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="eyebrow">The Terpene Sommelier</div>
    <h1>Your Palate</h1>
  </div>
  <div id="out"><div class="msg">Reading your ratings…</div></div>
</div>

<script>
/* ══════════════════════════════════════════════════════════════
   Your Palate — turns a user's ratings into favorite / avoid terpenes.

   Algorithm (as specced):
   • Only RATED products count (a rating tells us preference).
   • Each product's rating is CENTERED: 1★=-2 … 3★=0 … 5★=+2, so a
     neutral "it was fine" doesn't push any terpene either way.
   • For each terpene in a product, the centered rating is weighted by
     that terpene's share of the ENTERED percentages. If the user gave
     no percentages for a product, its terpenes share equal weight.
   • Positions 1/2/3 are never used as weight — only entered %.
   • A terpene's score = weighted average of centered ratings across
     every rated product containing it (range -2..+2).
   • Positive → favorite, negative → avoid. All rated terpenes shown;
     ones backed by few products are flagged so confidence is visible.
══════════════════════════════════════════════════════════════ */
const READ_URL = "https://script.google.com/macros/s/AKfycbwDB49IjpEutdT-XH8bXX-Y2Eq6uBRqxN4Dl1Trcmg6otbfv9pPkm8ZnEBHDjxzXSt4/exec";
const USER_EMAIL = new URLSearchParams(location.search).get("user") || "";
const out = document.getElementById("out");

const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* terpene name normalisation — mirrors the collection page so the two agree */
const ALIASES = {
  "trans-Caryophyllene":"Beta-Caryophyllene","trans-beta-Caryophyllene":"Beta-Caryophyllene",
  "Caryophyllene":"Beta-Caryophyllene","Myrcene":"Beta-Myrcene","Humulene":"Alpha-Humulene",
  "Beta-Linalool":"Linalool","Alpha-Bisabolol":"Bisabolol","Beta-Bisabolol":"Bisabolol",
  "Alpha-Farnesene":"Farnesene","Beta-Farnesene":"Farnesene","Gamma-Terpinolene":"Terpinolene"
};
function normTerp(raw) {
  if (!raw) return "";
  const r = String(raw).trim();
  if (ALIASES[r]) return ALIASES[r];
  return r;
}
const AROMA_NOTE = {
  "Beta-Myrcene":"Earth","Beta-Caryophyllene":"Pepper","Limonene":"Citrus","D-Limonene":"Citrus",
  "Alpha-Pinene":"Pine","Beta-Pinene":"Pine","Linalool":"Floral","Alpha-Humulene":"Hops",
  "Terpinolene":"Herbal","Ocimene":"Sweet","Bisabolol":"Chamomile","Nerolidol":"Woody",
  "Guaiol":"Resin","Farnesene":"Apple","Eucalyptol":"Mint","Valencene":"Orange",
  "Terpineol":"Lilac","Geraniol":"Rose","Ocimene ":"Sweet","Camphene":"Camphor"
};

/* ── the algorithm ── */
function computePalate(scans, ratings) {
  // index scans by GTIN so a rating can find its product's terpenes
  const byGtin = {};
  scans.forEach(s => { if (s.gtin) byGtin[s.gtin] = s; });

  const acc = {};   // terpene -> {wsum, wrate, products, ratingSum}
  let ratedCount = 0;

  Object.keys(ratings).forEach(gtin => {
    const entry = ratings[gtin];
    const rating = (entry && typeof entry === "object") ? entry.rating : entry;
    if (!(rating >= 1 && rating <= 5)) return;      // must be rated
    const scan = byGtin[gtin];
    if (!scan) return;                              // need the terpene snapshot

    ratedCount++;
    const centered = rating - 3;                    // -2..+2

    // terpene names from the snapshot
    const names = [scan.terp1, scan.terp2, scan.terp3].map(normTerp).filter(Boolean);
    if (!names.length) return;

    // entered percentages (persisted on the rating), aligned to positions
    const pcts = (entry && typeof entry === "object")
      ? [entry.p1, entry.p2, entry.p3]
      : [null, null, null];
    const havePct = pcts.some(p => p != null && p > 0);
    const totalPct = havePct ? pcts.reduce((a, b) => a + (b > 0 ? b : 0), 0) : 0;

    names.forEach((name, i) => {
      let w;
      if (havePct && totalPct > 0) {
        const p = pcts[i];
        w = (p != null && p > 0) ? p / totalPct : 0;   // share of entered content
      } else {
        w = 1 / names.length;                          // equal weight fallback
      }
      if (w <= 0) return;
      const a = acc[name] || (acc[name] = {wsum:0, wrate:0, products:0, ratingSum:0});
      a.wsum += w;
      a.wrate += w * centered;
      a.products += 1;
      a.ratingSum += rating;
    });
  });

  const terps = Object.keys(acc).map(name => {
    const a = acc[name];
    return {
      terpene: name,
      score: a.wsum ? a.wrate / a.wsum : 0,          // -2..+2
      avg: a.products ? a.ratingSum / a.products : 0,
      products: a.products
    };
  });

  return { terps, ratedCount };
}

/* ── rendering ── */
function starEls(avg) {
  const full = Math.round(avg);
  let s = "";
  for (let i = 1; i <= 5; i++) s += `<span class="${i <= full ? "on" : "off"}">\u2605</span>`;
  return s;
}
function terpRow(t, rank) {
  const pct = Math.min(50, Math.abs(t.score) / 2 * 50);   // half-width max from centre
  const left = t.score >= 0 ? 50 : (50 - pct);
  const low = t.products < 2;
  const aroma = AROMA_NOTE[t.terpene];
  return `
    <div class="terp">
      <span class="rank">${rank}</span>
      <div class="body">
        <div class="name">${esc(t.terpene)}${aroma ? `<span class="aroma">${esc(aroma)}</span>` : ""}</div>
        <div class="meter"><span class="fill" style="left:${left}%;width:${pct}%"></span></div>
      </div>
      <div class="side">
        <div class="stars">${starEls(t.avg)}</div>
        <div class="n ${low ? "new" : ""}">${t.products} product${t.products === 1 ? "" : "s"}${low ? " · new" : ""}</div>
      </div>
    </div>`;
}

function render(data) {
  const { terps, ratedCount } = data;

  if (!USER_EMAIL) {
    out.innerHTML = `<div class="msg"><b>Sign in to see your palate</b>Rate the products in your collection and your taste profile builds here.</div>`;
    return;
  }
  if (ratedCount === 0) {
    out.innerHTML = `<div class="msg"><b>No ratings yet</b>Open a card in your collection, give it a star rating, and your palate starts here.</div>`;
    return;
  }

  const favs = terps.filter(t => t.score > 0.15).sort((a, b) => b.score - a.score);
  const avoid = terps.filter(t => t.score < -0.15).sort((a, b) => a.score - b.score);
  const neutral = terps.length - favs.length - avoid.length;

  // a plain-language headline
  let head = "";
  if (favs.length) {
    const top = favs.slice(0, 3).map(t => t.terpene).join(", ");
    head += `You lean toward <b>${esc(top)}</b>. `;
  }
  if (avoid.length) {
    const bot = avoid.slice(0, 2).map(t => t.terpene).join(" and ");
    head += `You tend to rate <b>${esc(bot)}</b> lower.`;
  }
  if (!head) head = "Keep rating — a few more and clear patterns will emerge.";

  out.innerHTML = `
    <div class="thesis">
      <div class="line">${head}</div>
      <div class="stats">
        <div><div class="num">${ratedCount}</div><div class="lbl">Rated</div></div>
        <div><div class="num">${terps.length}</div><div class="lbl">Terpenes</div></div>
        <div><div class="num">${favs.length}</div><div class="lbl">Favorites</div></div>
      </div>
    </div>

    ${favs.length ? `
    <div class="section fav">
      <div class="shead"><span class="tag">Favorites</span><span class="count">${favs.length}</span></div>
      <div class="sub">Terpenes in the products you rate highest.</div>
      ${favs.map((t, i) => terpRow(t, i + 1)).join("")}
    </div>` : ""}

    ${avoid.length ? `
    <div class="section avoid">
      <div class="shead"><span class="tag">Tend to Avoid</span><span class="count">${avoid.length}</span></div>
      <div class="sub">Terpenes in the products you rate lowest.</div>
      ${avoid.map((t, i) => terpRow(t, i + 1)).join("")}
    </div>` : ""}

    <div class="legend">
      Scores weight each rating by the terpene percentages you enter on a card;
      without them, a product's three terpenes count equally. Label position
      (1st, 2nd, 3rd) is never used — it doesn't indicate dominance. A terpene
      marked <b>new</b> is backed by a single product, so it will move as you
      rate more.
    </div>`;
}

/* ── load ── */
async function load() {
  if (!USER_EMAIL) { render({ terps: [], ratedCount: 0 }); return; }
  try {
    const r = await fetch(`${READ_URL}?type=palate&user=${encodeURIComponent(USER_EMAIL)}`);
    const d = await r.json();
    const scans = Array.isArray(d.scans) ? d.scans : [];
    const ratings = d.ratings || {};
    render(computePalate(scans, ratings));
  } catch {
    out.innerHTML = `<div class="msg"><b>Couldn't load your palate</b>Check your connection and pull down to refresh.</div>`;
  }
}
load();
</script>
</body>
</html>
